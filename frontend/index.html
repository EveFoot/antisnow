<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AntiSnow — Система мониторинга</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { 
            --primary: #007bff; 
            --danger: #dc3545; 
            --success: #28a745; 
            --gray: #6c757d;
        }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; background: #f8f9fa; }
        
        /* Карта */
        #map { height: 100vh; width: 100vw; z-index: 1; }

        /* Верхняя панель */
        .top-nav { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: white; padding: 10px 25px; border-radius: 50px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 15px; 
        }
        .user-email { font-size: 13px; font-weight: bold; color: var(--primary); }

        /* Кнопки */
        .btn { padding: 8px 18px; border: none; border-radius: 20px; cursor: pointer; font-weight: 600; transition: 0.2s; font-size: 14px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-outline { background: transparent; border: 1px solid #ddd; }

        /* Боковые панели */
        .side-panel { 
            position: fixed; top: 0; right: -400px; width: 320px; height: 100vh; 
            background: white; z-index: 2000; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            padding: 30px; box-shadow: -5px 0 25px rgba(0,0,0,0.1); overflow-y: auto; 
        }
        .side-panel.open { right: 0; }
        .side-panel h2 { margin-top: 0; font-size: 22px; color: #333; }

        /* Поля ввода */
        label { display: block; margin-top: 15px; font-size: 12px; color: #666; font-weight: bold; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 14px; }

        /* Контейнер фото в попапе */
        .photos-container { display: flex; gap: 8px; margin-top: 12px; }
        .photo-block { flex: 1; text-align: center; }
        .photo-block img { 
            width: 100%; height: 90px; border-radius: 8px; object-fit: cover; 
            border: 1px solid #eee; cursor: zoom-in; background: #f0f0f0; 
            transition: transform 0.2s;
        }
        .photo-block img:hover { transform: scale(1.02); }
        .photo-block b { display: block; font-size: 10px; margin-bottom: 4px; color: #888; text-transform: uppercase; }
        
        /* Инфо в попапе */
        .popup-info { font-size: 12px; color: #555; margin-bottom: 5px; }
        .popup-info b { color: #222; }
        hr { border: 0; border-top: 1px solid #eee; margin: 15px 0; }

        .status-badge { 
            display: inline-block; padding: 2px 8px; border-radius: 4px; 
            font-size: 10px; font-weight: bold; margin-bottom: 10px; 
        }
    </style>
</head>
<body>

<div class="top-nav">
    <div id="user-info" class="user-email"></div>
    <button id="auth-btn" class="btn btn-outline" onclick="togglePanel('auth-panel')">Вход / Регистрация</button>
    <button id="add-btn" class="btn btn-primary" style="display:none">Кликните на карту для метки</button>
    <button id="admin-btn" class="btn" style="background:var(--danger); color:white; display:none" onclick="openAdmin()">Админка</button>
</div>

<div id="map"></div>

<div id="report-panel" class="side-panel">
    <h2>Новая метка</h2>
    <p style="font-size: 13px; color: #777;">Укажите тип проблемы и прикрепите фото для подтверждения.</p>
    <input type="hidden" id="lat"><input type="hidden" id="lon">
    
    <label>Тип проблемы</label>
    <select id="snow-type">
        <option>Снежная каша</option>
        <option>Гололёд (опасно)</option>
        <option>Сугробы на тротуаре</option>
        <option>Завален выезд</option>
    </select>
    
    <label>Фото места (ДО)</label>
    <input type="file" id="file-in" accept="image/*">
    
    <button id="submit-report-btn" class="btn btn-primary" style="width:100%; margin-top:20px" onclick="submitReport()">Отправить</button>
    <button class="btn btn-outline" style="width:100%; margin-top:10px" onclick="closePanels()">Отмена</button>
</div>

<div id="auth-panel" class="side-panel">
    <h2 id="auth-title">Вход в систему</h2>
    <input type="email" id="email" placeholder="E-mail">
    <input type="password" id="password" placeholder="Пароль">
    <button class="btn btn-primary" style="width:100%; margin-top:10px" onclick="handleAuth('login')">Войти</button>
    <button class="btn btn-outline" style="width:100%; margin-top:10px; border-color: var(--success); color: var(--success);" onclick="handleAuth('register')">Создать аккаунт</button>
</div>

<div id="admin-panel" class="side-panel">
    <h2>Пользователи</h2>
    <div id="users-list"></div>
    <button class="btn btn-outline" style="width:100%; margin-top:20px" onclick="closePanels()">Закрыть</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Инициализация карты
    const map = L.map('map', { zoomControl: false }).setView([61.6688, 50.8365], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const icons = {
        pending: new L.Icon({iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png', iconSize: [25, 41], iconAnchor: [12, 41]}),
        cleaned: new L.Icon({iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png', iconSize: [25, 41], iconAnchor: [12, 41]}),
        verified: new L.Icon({iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png', iconSize: [25, 41], iconAnchor: [12, 41]})
    };

    function togglePanel(id) { closePanels(); document.getElementById(id).classList.add('open'); }
    function closePanels() { document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('open')); }
    function fmtDate(d) { return d ? new Date(d).toLocaleString('ru-RU', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}) : '--'; }

    // Клик по карте
    map.on('click', e => {
        if(!localStorage.getItem('token')) {
            alert("Пожалуйста, сначала войдите в систему.");
            return togglePanel('auth-panel');
        }
        document.getElementById('lat').value = e.latlng.lat;
        document.getElementById('lon').value = e.latlng.lng;
        togglePanel('report-panel');
    });

    // Авторизация
    async function handleAuth(type) {
        const e = document.getElementById('email').value, p = document.getElementById('password').value;
        if(!e || !p) return alert("Введите данные!");

        const fd = new FormData();
        if(type === 'login') { fd.append('username', e); fd.append('password', p); }
        
        const url = type === 'register' ? `/api/auth/register?email=${e}&password=${p}` : `/api/auth/login`;
        
        try {
            const res = await fetch(url, { method: 'POST', body: fd });
            const data = await res.json();
            
            if(res.ok) {
                if(type === 'login') {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('role', data.role);
                    localStorage.setItem('user_email', data.email);
                    location.reload();
                } else {
                    alert("Регистрация прошла успешно! Теперь войдите.");
                }
            } else {
                alert("Ошибка: " + (data.detail || "Неверный логин или пароль"));
            }
        } catch(err) { alert("Сервер недоступен"); }
    }

    // Создание метки
    async function submitReport() {
        const btn = document.getElementById('submit-report-btn');
        const fd = new FormData();
        fd.append('lat', document.getElementById('lat').value);
        fd.append('lon', document.getElementById('lon').value);
        fd.append('snow_type', document.getElementById('snow-type').value);
        
        const f = document.getElementById('file-in').files[0];
        if(f) fd.append('file', f);

        btn.innerText = "Отправка...";
        btn.disabled = true;

        const res = await fetch('/api/reports', { 
            method: 'POST', 
            headers: {'Authorization': 'Bearer ' + localStorage.getItem('token')}, 
            body: fd 
        });

        if(res.ok) location.reload();
        else {
            alert("Ошибка сохранения");
            btn.innerText = "Отправить";
            btn.disabled = false;
        }
    }

    // Загрузка меток
    async function loadReports() {
        const res = await fetch('/api/reports');
        if(!res.ok) return;
        const reports = await res.json();
        const role = localStorage.getItem('role');
        
        reports.forEach(r => {
            const m = L.marker([r.lat, r.lon], {icon: icons[r.status] || icons.pending}).addTo(map);
            
            let statusText = r.status === 'pending' ? 'ОЖИДАЕТ' : (r.status === 'cleaned' ? 'УБРАНО' : 'ПРОВЕРЕНО');
            let statusColor = r.status === 'pending' ? 'var(--danger)' : (r.status === 'cleaned' ? 'var(--primary)' : 'var(--success)');

            let h = `<div style="min-width:240px">`;
            h += `<span class="status-badge" style="background:${statusColor}; color:white">${statusText}</span>`;
            h += `<div style="font-size:16px; font-weight:bold; margin-bottom:10px;">${r.snow_type}</div>`;
            h += `<div class="popup-info">👤 Автор: <b>${r.author_email || 'системный'}</b></div>`;
            h += `<div class="popup-info">🕒 Создано: ${fmtDate(r.created_at)}</div>`;
            
            // Блок с двумя фото
            h += `<div class="photos-container">`;
            h += `<div class="photo-block"><b>До</b>${r.photo_url ? `<img src="${r.photo_url}" onclick="window.open('${r.photo_url}')">` : '<div style="height:90px;background:#f5f5f5;border-radius:8px;"></div>'}</div>`;
            h += `<div class="photo-block"><b>После</b>${r.done_photo_url ? `<img src="${r.done_photo_url}" onclick="window.open('${r.done_photo_url}')">` : '<div style="height:90px;background:#f5f5f5;border-radius:8px;"></div>'}</div>`;
            h += `</div>`;

            // Управление для сотрудников
            if(r.status === 'pending' && (role === 'cleaner' || role === 'admin')) {
                h += `<hr><label>Загрузить результат:</label><input type="file" id="f-${r.id}" style="font-size:11px">`;
                h += `<button class="btn btn-primary" style="width:100%;margin-top:5px" onclick="markDone(${r.id})">Отметить выполненным</button>`;
            }
            
            // Управление для админа
            if(r.status === 'cleaned' && role === 'admin') {
                h += `<hr><button class="btn" style="background:var(--success);color:white;width:100%" onclick="verify(${r.id})">Подтвердить качество</button>`;
            }
            
            if(role === 'admin') {
                h += `<button class="btn" style="background:var(--gray);color:white;width:100%;margin-top:5px;font-size:11px" onclick="del(${r.id})">Удалить метку</button>`;
            }
            
            h += `</div>`;
            m.bindPopup(h);
        });
    }

    async function markDone(id) {
        const fd = new FormData(); 
        const f = document.getElementById(`f-${id}`).files[0];
        if(!f) return alert("Прикрепите фото результата!");
        fd.append('file', f);
        
        await fetch(`/api/reports/${id}/done`, { 
            method: 'POST', 
            headers: {'Authorization': 'Bearer '+localStorage.getItem('token')}, 
            body: fd 
        });
        location.reload();
    }

    async function verify(id) {
        await fetch(`/api/reports/${id}/verify`, { method: 'POST', headers: {'Authorization': 'Bearer '+localStorage.getItem('token')} });
        location.reload();
    }

    async function del(id) {
        if(confirm("Вы уверены, что хотите удалить эту метку?")) {
            await fetch(`/api/reports/${id}`, { method: 'DELETE', headers: {'Authorization': 'Bearer '+localStorage.getItem('token')} });
            location.reload();
        }
    }

    async function openAdmin() {
        togglePanel('admin-panel');
        const res = await fetch('/api/admin/users', { headers: {'Authorization': 'Bearer '+localStorage.getItem('token')} });
        const users = await res.json();
        document.getElementById('users-list').innerHTML = users.map(u => `
            <div style="padding:12px; border-bottom:1px solid #eee; font-size:13px">
                <b>${u.email}</b><br>
                Роль: <select onchange="upRole(${u.id}, this.value)" style="padding:4px; margin:5px 0;">
                    <option value="user" ${u.role==='user'?'selected':''}>Пользователь</option>
                    <option value="cleaner" ${u.role==='cleaner'?'selected':''}>Уборщик</option>
                    <option value="admin" ${u.role==='admin'?'selected':''}>Админ</option>
                </select>
            </div>
        `).join('');
    }

    async function upRole(id, role) {
        await fetch(`/api/admin/users/${id}/role`, { 
            method: 'PUT', 
            headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer '+localStorage.getItem('token')}, 
            body: JSON.stringify({role}) 
        });
    }

    // Инициализация интерфейса
    function init() {
        const email = localStorage.getItem('user_email');
        const role = localStorage.getItem('role');
        if(email) {
            document.getElementById('user-info').innerText = email;
            document.getElementById('auth-btn').innerText = 'Выйти';
            document.getElementById('auth-btn').onclick = () => { localStorage.clear(); location.reload(); };
            document.getElementById('add-btn').style.display = 'block';
            if(role === 'admin') document.getElementById('admin-btn').style.display = 'block';
        }
        loadReports();
    }

    init();
</script>
</body>
</html>
