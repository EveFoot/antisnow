<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AntiSnow - Карта</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #007bff; --danger: #dc3545; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        .top-nav { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; background: white; padding: 10px 20px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: flex; gap: 10px; }
        .btn { padding: 10px 20px; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: var(--primary); color: white; }
        .side-panel { position: fixed; top: 0; right: -450px; width: 350px; height: 100vh; background: white; z-index: 2000; transition: 0.4s; padding: 30px; box-shadow: -5px 0 20px rgba(0,0,0,0.15); box-sizing: border-box; overflow-y: auto; }
        .side-panel.open { right: 0; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .user-card { border-bottom: 1px solid #eee; padding: 15px 0; }
    </style>
</head>
<body>

<div class="top-nav">
    <button id="auth-btn" class="btn btn-primary" onclick="togglePanel('auth-panel')">Вход</button>
    <button id="add-btn" class="btn btn-primary" style="display:none">Добавить (клик на карту)</button>
    <button id="admin-btn" class="btn btn-primary" style="background:var(--danger); display:none" onclick="openAdmin()">Админка</button>
</div>

<div id="map"></div>

<div id="report-panel" class="side-panel">
    <h2>Новая метка</h2>
    <input type="text" id="lat" readonly><input type="text" id="lon" readonly>
    <select id="snow-type"><option>Снежная каша</option><option>Гололед</option><option>Сугробы</option></select>
    <input type="file" id="file-in">
    <button class="btn btn-primary" style="width:100%" onclick="submitReport()">Отправить</button>
    <button class="btn" style="width:100%; margin-top:10px" onclick="closePanels()">Отмена</button>
</div>

<div id="auth-panel" class="side-panel">
    <h2>Аккаунт</h2>
    <input type="email" id="email" placeholder="Email"><input type="password" id="password" placeholder="Пароль">
    <button class="btn btn-primary" style="width:100%" onclick="handleAuth('login')">Войти</button>
    <button class="btn" style="width:100%; margin-top:10px" onclick="handleAuth('register')">Регистрация</button>
</div>

<div id="admin-panel" class="side-panel">
    <h2>Управление правами</h2>
    <div id="users-list"></div>
    <button class="btn" style="width:100%; margin-top:20px" onclick="closePanels()">Закрыть</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false }).setView([61.6688, 50.8365], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    function togglePanel(id) {
        const p = document.getElementById(id);
        const isOpen = p.classList.contains('open');
        closePanels();
        if(!isOpen) p.classList.add('open');
    }
    function closePanels() { document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('open')); }

    map.on('click', e => {
        if(!localStorage.getItem('token')) return togglePanel('auth-panel');
        document.getElementById('lat').value = e.latlng.lat.toFixed(6);
        document.getElementById('lon').value = e.latlng.lng.toFixed(6);
        togglePanel('report-panel');
    });

    async function handleAuth(type) {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        const url = type === 'register' ? `/api/auth/register?email=${e}&password=${p}` : `/api/auth/login`;
        let fd = null;
        if(type === 'login') { fd = new FormData(); fd.append('username', e); fd.append('password', p); }
        const res = await fetch(url, { method: 'POST', body: fd });
        const data = await res.json();
        if(res.ok && type === 'login') {
            localStorage.setItem('token', data.access_token);
            localStorage.setItem('role', data.role);
            location.reload();
        } else if(res.ok) alert("Успешно!");
    }

    async function submitReport() {
        const token = localStorage.getItem('token');
        const fd = new FormData();
        fd.append('lat', document.getElementById('lat').value);
        fd.append('lon', document.getElementById('lon').value);
        fd.append('snow_type', document.getElementById('snow-type').value);
        const f = document.getElementById('file-in').files[0];
        if(f) fd.append('file', f);

        const res = await fetch('/api/reports', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token },
            body: fd
        });
        if(res.ok) location.reload(); else alert("Ошибка сохранения");
    }

    async function loadReports() {
        const res = await fetch('/api/reports');
        const reports = await res.json();
        reports.forEach(r => {
            const m = L.marker([r.lat, r.lon]).addTo(map);
            let h = `<b>${r.snow_type}</b><br>Статус: ${r.status}`;
            if(r.photo_url) h += `<br><img src="${r.photo_url}" style="width:150px">`;
            m.bindPopup(h);
        });
    }

    async function openAdmin() {
        togglePanel('admin-panel');
        const res = await fetch('/api/admin/users', { headers: {'Authorization': 'Bearer '+localStorage.getItem('token')} });
        const users = await res.json();
        document.getElementById('users-list').innerHTML = users.map(u => `
            <div class="user-card">
                ${u.email}
                <select onchange="updateRole(${u.id}, this.value)">
                    <option value="user" ${u.role==='user'?'selected':''}>User</option>
                    <option value="cleaner" ${u.role==='cleaner'?'selected':''}>Cleaner</option>
                    <option value="admin" ${u.role==='admin'?'selected':''}>Admin</option>
                </select>
            </div>
        `).join('');
    }

    async function updateRole(id, role) {
        await fetch(`/api/admin/users/${id}/role`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer '+localStorage.getItem('token')},
            body: JSON.stringify({role})
        });
        alert("Роль обновлена");
    }

    if(localStorage.getItem('token')) {
        document.getElementById('auth-btn').innerText = 'Выйти';
        document.getElementById('auth-btn').onclick = () => { localStorage.clear(); location.reload(); };
        document.getElementById('add-btn').style.display = 'block';
        if(localStorage.getItem('role') === 'admin') document.getElementById('admin-btn').style.display = 'block';
    }
    loadReports();
</script>
</body>
</html>
