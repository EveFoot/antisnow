<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AntiSnow - Сыктывкар</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: sans-serif; overflow: hidden; background: #f0f2f5; }
        #map { height: 100vh; width: 100vw; }
        .top-nav {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: white; padding: 10px 20px;
            border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex; gap: 10px;
        }
        .btn { padding: 8px 16px; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-primary { background: #007bff; color: white; }
        .btn-admin { background: #dc3545; color: white; display: none; }
        .side-panel {
            position: absolute; top: 0; right: -400px; width: 350px; height: 100vh;
            background: white; z-index: 1001; transition: 0.4s; padding: 25px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.1); overflow-y: auto;
        }
        .side-panel.open { right: 0; }
        .close-btn { float: right; cursor: pointer; font-size: 24px; color: #666; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-clean { background: #28a745; color: white; margin-top: 10px; width: 100%; }
        .btn-delete { background: #ff4d4d; color: white; margin-top: 5px; width: 100%; }
        .report-img { width: 100%; border-radius: 8px; margin-top: 10px; cursor: pointer; border: 1px solid #ddd; background: #eee; min-height: 100px; object-fit: cover; }
    </style>
</head>
<body>

    <div class="top-nav">
        <button id="auth-main-btn" class="btn btn-primary" onclick="togglePanel('auth-panel')">Вход</button>
        <button class="btn btn-primary" onclick="togglePanel('report-panel')">Сообщить о снеге</button>
        <button id="admin-btn" class="btn btn-admin" onclick="openAdminPanel()">Права</button>
    </div>

    <div id="map"></div>

    <div id="auth-panel" class="side-panel">
        <span class="close-btn" onclick="closePanels()">&times;</span>
        <h2>Аккаунт</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Пароль">
        <button class="btn btn-primary" style="width:100%" onclick="handleAuth('login')">Войти</button>
        <button class="btn" style="width:100%; margin-top:10px; background: #eee;" onclick="handleAuth('register')">Регистрация</button>
    </div>

    <div id="report-panel" class="side-panel">
        <span class="close-btn" onclick="closePanels()">&times;</span>
        <h2>Новая метка</h2>
        <input type="text" id="lat" placeholder="Широта (кликните карту)" readonly>
        <input type="text" id="lon" placeholder="Долгота (кликните карту)" readonly>
        <select id="snow-type">
            <option value="Снежная каша">Снежная каша</option>
            <option value="Гололед">Гололед</option>
            <option value="Сугробы">Сугробы</option>
        </select>
        <button class="btn btn-primary" style="width:100%" onclick="submitReport()">Отправить</button>
    </div>

    <div id="admin-panel" class="side-panel">
        <span class="close-btn" onclick="closePanels()">&times;</span>
        <h2>Пользователи</h2>
        <div id="users-list"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([61.6688, 50.8365], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        function togglePanel(id) {
            const panel = document.getElementById(id);
            const isOpen = panel.classList.contains('open');
            closePanels();
            if (!isOpen) panel.classList.add('open');
        }

        function closePanels() { document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('open')); }

        map.on('click', (e) => {
            document.getElementById('lat').value = e.latlng.lat.toFixed(6);
            document.getElementById('lon').value = e.latlng.lng.toFixed(6);
            togglePanel('report-panel');
        });

        async function handleAuth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            let url = type === 'register' ? `/api/auth/register?email=${email}&password=${password}` : `/api/auth/login`;
            let body = null;
            if (type === 'login') {
                body = new FormData();
                body.append('username', email);
                body.append('password', password);
            }
            const res = await fetch(url, { method: 'POST', body: body });
            const data = await res.json();
            if (res.ok) {
                if (type === 'login') {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('role', data.role);
                    location.reload();
                } else alert("Успешно!");
            }
        }

        async function submitReport() {
            const lat = document.getElementById('lat').value;
            const lon = document.getElementById('lon').value;
            if(!lat) return alert("Кликните на карту!");
            const res = await fetch('/api/reports', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ lat: parseFloat(lat), lon: parseFloat(lon), snow_type: document.getElementById('snow-type').value })
            });
            if (res.ok) location.reload();
        }

        async function loadReports() {
            const res = await fetch('/api/reports');
            const data = await res.json();
            const role = localStorage.getItem('role');
            data.forEach(r => {
                const isCleaned = r.status === 'cleaned';
                const marker = L.marker([r.lat, r.lon]).addTo(map);
                let html = `<b>${r.snow_type}</b><br>Статус: ${isCleaned ? '✅ Убрано' : '⏳ Ожидает'}`;
                if (r.photo_url) {
                    const url = r.photo_url + '?t=' + new Date().getTime();
                    html += `<br><img src="${url}" class="report-img" onclick="window.open('${r.photo_url}')">`;
                }
                if (!isCleaned && (role === 'cleaner' || role === 'admin')) {
                    html += `<hr><input type="file" id="file-${r.id}"><button class="btn btn-clean" onclick="markDone(${r.id})">Отметить убрано</button>`;
                }
                marker.bindPopup(html);
            });
        }

        async function markDone(id) {
            const file = document.getElementById(`file-${id}`).files[0];
            if(!file) return alert("Выберите фото!");
            const fd = new FormData(); fd.append('file', file);
            await fetch(`/api/cleaner/reports/${id}/done`, { method: 'POST', body: fd });
            location.reload();
        }

        loadReports();
        if(localStorage.getItem('role') === 'admin') document.getElementById('admin-btn').style.display='block';
    </script>
</body>
</html>
