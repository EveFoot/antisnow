<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AntiSnow - Чистый город</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #f0f2f5; }
        #map { height: 100vh; width: 100vw; }
        .top-nav { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: white; padding: 10px 20px; border-radius: 50px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: flex; gap: 10px;
        }
        .btn { padding: 10px 20px; border: none; border-radius: 25px; cursor: pointer; font-weight: 600; }
        .btn-primary { background: var(--primary); color: white; }
        .side-panel { 
            position: absolute; top: 0; right: -400px; width: 320px; height: 100vh; 
            background: white; z-index: 2000; transition: 0.4s; padding: 25px;
        }
        .side-panel.open { right: 0; }
    </style>
</head>
<body>

<div class="top-nav">
    <button class="btn btn-primary" onclick="locateUser()">📍 Где я?</button>
    <button id="auth-btn" class="btn btn-primary" onclick="togglePanel('auth-panel')">Вход</button>
    <button id="add-btn" class="btn btn-primary" style="display:none" onclick="togglePanel('report-panel')">Метка</button>
</div>

<div id="map"></div>

<div id="auth-panel" class="side-panel">
    <h2>Вход</h2>
    <input type="email" id="email" placeholder="Email" style="width:100%; margin-bottom:10px; padding:10px;">
    <input type="password" id="password" placeholder="Пароль" style="width:100%; margin-bottom:10px; padding:10px;">
    <button class="btn btn-primary" style="width:100%" onclick="handleAuth()">Войти</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false }).setView([61.6688, 50.8365], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    function togglePanel(id) {
        document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('open'));
        document.getElementById(id).classList.add('open');
    }

    async function handleAuth() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const fd = new FormData();
        fd.append('username', email);
        fd.append('password', password);

        try {
            const res = await fetch('/api/auth/login', { method: 'POST', body: fd });
            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('token', data.access_token);
                location.reload();
            } else { alert("Ошибка входа"); }
        } catch (e) { alert("Сервер недоступен"); }
    }

    if (localStorage.getItem('token')) {
        document.getElementById('auth-btn').innerText = 'Выход';
        document.getElementById('add-btn').style.display = 'block';
    }
</script>
</body>
</html>
