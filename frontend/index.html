<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AntiSnow Сыктывкар</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        #sidebar, #admin-panel { width: 0; background: white; transition: 0.3s; overflow-y: auto; z-index: 2000; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        #sidebar.open, #admin-panel.open { width: 350px; padding: 20px; }
        #map { flex: 1; z-index: 1; }
        .top-nav { position: absolute; top: 15px; left: 60px; right: 15px; z-index: 1000; display: flex; justify-content: space-between; pointer-events: none; }
        .nav-block { background: white; padding: 8px 15px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); pointer-events: auto; display: flex; align-items: center; gap: 10px; }
        .role-admin { background: #dc3545; color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
        .user-row { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .popup-photo { width: 100%; max-height: 150px; object-fit: cover; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="admin-panel">
        <button onclick="document.getElementById('admin-panel').classList.remove('open')">Закрыть</button>
        <h3>Управление правами</h3>
        <div id="users-list">Загрузка...</div>
    </div>

    <div id="sidebar">
        <h3>Новая заявка</h3>
        <form id="reportForm">
            <input type="text" id="address" placeholder="Где снег?" required style="width:100%; padding:8px; margin-bottom:10px;">
            <input type="hidden" id="lat"><input type="hidden" id="lon">
            <input type="file" id="photo" accept="image/*" style="margin-bottom:10px;">
            <button type="submit" style="width:100%; background:green; color:white; padding:10px; border:none;">Отправить</button>
        </form>
    </div>

    <div id="map">
        <div class="top-nav">
            <div class="nav-block">
                <span id="display-email">...</span>
                <span id="display-role">...</span>
                <button id="admin-btn" style="display:none;" onclick="openAdminPanel()">Права</button>
                <button onclick="localStorage.clear(); window.location.href='/login.html'">Выйти</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');
        if (!token) window.location.href = '/login.html';

        document.getElementById('display-email').innerText = localStorage.getItem('user_email');
        if (role === 'admin') {
            document.getElementById('display-role').innerText = 'Админ';
            document.getElementById('display-role').className = 'role-admin';
            document.getElementById('admin-btn').style.display = 'inline';
        } else {
            document.getElementById('display-role').innerText = 'Житель';
        }

        const map = L.map('map').setView([61.66, 50.81], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        map.on('click', (e) => {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('lat').value = e.latlng.lat;
            document.getElementById('lon').value = e.latlng.lng;
        });

        document.getElementById('reportForm').onsubmit = async (e) => {
            e.preventDefault();
            const fd = new FormData();
            fd.append('address', document.getElementById('address').value);
            fd.append('lat', document.getElementById('lat').value);
            fd.append('lon', document.getElementById('lon').value);
            const p = document.getElementById('photo').files[0];
            if(p) fd.append('photo', p);
            await fetch('/api/report', { method: 'POST', body: fd });
            location.reload();
        };

        async function loadReports() {
            const res = await fetch('/api/reports');
            const data = await res.json();
            data.forEach(r => {
                const marker = L.marker([r.lat, r.lon]).addTo(map);
                if (r.status === 'Убрано') marker._icon.style.filter = "hue-rotate(140deg)";
                let h = `<b>${r.address}</b><br>Статус: ${r.status}`;
                if(r.photo_url) h += `<br><img src="${r.photo_url}" class="popup-photo">`;
                if(role === 'admin' && r.status === 'Новый') h += `<br><button onclick="setStatus(${r.id})">УБРАНО</button>`;
                marker.bindPopup(h);
            });
        }

        async function setStatus(id) {
            await fetch(`/api/reports/${id}/status?new_status=Убрано`, { 
                method: 'PATCH', 
                headers: { 'Authorization': `Bearer ${token}` } 
            });
            location.reload();
        }

        async function openAdminPanel() {
            document.getElementById('admin-panel').classList.add('open');
            const res = await fetch('/api/admin/users', { headers: { 'Authorization': `Bearer ${token}` } });
            const users = await res.json();
            const list = document.getElementById('users-list');
            list.innerHTML = users.map(u => `
                <div class="user-row">
                    <span>${u.email} (${u.role})</span>
                    <button onclick="toggleRole(${u.id}, '${u.role}')">Сменить роль</button>
                </div>
            `).join('');
        }

        async function toggleRole(id, currentRole) {
            const newRole = currentRole === 'admin' ? 'user' : 'admin';
            await fetch(`/api/admin/users/${id}/role?new_role=${newRole}`, {
                method: 'PATCH',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            openAdminPanel();
        }

        loadReports();
    </script>
</body>
</html>
