<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AntiSnow - Сыктывкар</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; }
        .top-nav {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: white; padding: 10px 20px;
            border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex; gap: 10px;
        }
        .btn { padding: 8px 16px; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: #007bff; color: white; }
        .btn-admin { background: #dc3545; color: white; display: none; }
        .side-panel {
            position: absolute; top: 0; right: -400px; width: 320px; height: 100vh;
            background: white; z-index: 1001; transition: 0.4s; padding: 20px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.1);
        }
        .side-panel.open { right: 0; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="top-nav">
        <button id="auth-main-btn" class="btn btn-primary" onclick="togglePanel('auth-panel')">Вход / Регистрация</button>
        <button class="btn btn-primary" onclick="togglePanel('report-panel')">Сообщить о снеге</button>
        <button id="admin-btn" class="btn btn-admin" onclick="openAdminPanel()">Права</button>
    </div>

    <div id="map"></div>

    <div id="auth-panel" class="side-panel">
        <h2 id="auth-title">Авторизация</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Пароль">
        <button class="btn btn-primary" style="width:100%" onclick="handleAuth('login')">Войти</button>
        <button class="btn" style="width:100%; margin-top:10px" onclick="handleAuth('register')">Регистрация</button>
        <p id="auth-status" style="color: red;"></p>
        <button class="btn" onclick="closePanels()" style="margin-top: 20px;">Закрыть</button>
    </div>

    <div id="report-panel" class="side-panel">
        <h2>Новая метка</h2>
        <input type="text" id="lat" placeholder="Широта" readonly>
        <input type="text" id="lon" placeholder="Долгота" readonly>
        <select id="snow-type">
            <option value="Снежная каша">Снежная каша</option>
            <option value="Лед">Лед</option>
            <option value="Сугробы">Сугробы</option>
        </select>
        <button class="btn btn-primary" style="width:100%" onclick="submitReport()">Отправить</button>
        <button class="btn" onclick="closePanels()" style="margin-top: 20px;">Закрыть</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Сыктывкар
        const map = L.map('map').setView([61.6688, 50.8365], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        function togglePanel(id) {
            closePanels();
            document.getElementById(id).classList.add('open');
        }
        function closePanels() {
            document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('open'));
        }

        map.on('click', (e) => {
            document.getElementById('lat').value = e.latlng.lat.toFixed(6);
            document.getElementById('lon').value = e.latlng.lng.toFixed(6);
            togglePanel('report-panel');
        });

        // Управление кнопками
        function updateUI() {
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('role');
            const btn = document.getElementById('auth-main-btn');
            
            if (token) {
                btn.innerText = 'Выйти';
                btn.onclick = () => { localStorage.clear(); location.reload(); };
                if (role === 'admin') document.getElementById('admin-btn').style.display = 'block';
            }
        }

        async function handleAuth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            let url = type === 'register' ? `/api/auth/register?email=${email}&password=${password}` : `/api/auth/login`;
            
            let body = null;
            if (type === 'login') {
                body = new FormData();
                body.append('username', email);
                body.append('password', password);
            }

            const res = await fetch(url, { method: 'POST', body: body });
            const data = await res.json();

            if (res.ok) {
                if (type === 'login') {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('role', data.role);
                    location.reload();
                } else { alert("Успешно! Войдите."); }
            } else { document.getElementById('auth-status').innerText = data.detail || "Ошибка"; }
        }

        async function submitReport() {
            const token = localStorage.getItem('token');
            if (!token) return alert("Войдите в систему!");

            const res = await fetch('/api/reports', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({
                    lat: parseFloat(document.getElementById('lat').value),
                    lon: parseFloat(document.getElementById('lon').value),
                    snow_type: document.getElementById('snow-type').value
                })
            });
            if (res.ok) location.reload();
        }

        async function loadReports() {
            const res = await fetch('/api/reports');
            const data = await res.json();
            if (Array.isArray(data)) {
                data.forEach(r => L.marker([r.lat, r.lon]).addTo(map).bindPopup(r.snow_type));
            }
        }

        updateUI();
        loadReports();
    </script>
</body>
</html>
