<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AntiSnow - Сыктывкар</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; background: #f4f7f9; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        .top-nav {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: white; padding: 10px 20px;
            border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            display: flex; gap: 10px; align-items: center;
        }

        .btn { padding: 10px 20px; border: none; border-radius: 25px; cursor: pointer; font-weight: 600; transition: 0.2s; font-size: 14px; }
        .btn-primary { background: #007bff; color: white; }
        .btn-primary:hover { background: #0056b3; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-admin { background: #dc3545; color: white; display: none; }
        
        .side-panel {
            position: absolute; top: 0; right: -400px; width: 350px; height: 100vh;
            background: white; z-index: 1001; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            padding: 30px; box-shadow: -5px 0 20px rgba(0,0,0,0.1); overflow-y: auto;
        }
        .side-panel.open { right: 0; }
        .close-btn { float: right; cursor: pointer; font-size: 28px; color: #aaa; line-height: 20px; }
        .close-btn:hover { color: #333; }

        h2 { margin-top: 0; font-size: 22px; color: #333; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 14px; }
        input[readonly] { background: #f8f9fa; color: #888; }

        .report-img { width: 100%; border-radius: 10px; margin-top: 10px; cursor: pointer; border: 1px solid #eee; transition: 0.3s; }
        .report-img:hover { opacity: 0.9; }
        
        .user-item { padding: 15px; border-bottom: 1px solid #eee; display: flex; flex-direction: column; gap: 8px; }
        #auth-status { color: #dc3545; font-size: 13px; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

    <div class="top-nav">
        <button id="auth-main-btn" class="btn btn-primary" onclick="togglePanel('auth-panel')">Вход / Регистрация</button>
        <button class="btn btn-primary" onclick="togglePanel('report-panel')">Сообщить о снеге</button>
        <button id="admin-btn" class="btn btn-admin" onclick="openAdminPanel()">Управление правами</button>
    </div>

    <div id="map"></div>

    <div id="auth-panel" class="side-panel">
        <span class="close-btn" onclick="closePanels()">&times;</span>
        <h2>Авторизация</h2>
        <p style="color: #666; font-size: 13px;">Если у вас нет аккаунта, введите данные и нажмите «Регистрация».</p>
        <input type="email" id="email" placeholder="Ваш Email">
        <input type="password" id="password" placeholder="Пароль">
        <button class="btn btn-primary" style="width:100%; margin-top: 10px;" onclick="handleAuth('login')">Войти</button>
        <button class="btn btn-secondary" style="width:100%; margin-top: 10px;" onclick="handleAuth('register')">Регистрация</button>
        <div id="auth-status"></div>
    </div>

    <div id="report-panel" class="side-panel">
        <span class="close-btn" onclick="closePanels()">&times;</span>
        <h2>Новая метка</h2>
        <p style="font-size: 13px; color: #007bff;">Кликните на карту, чтобы выбрать точное место.</p>
        <input type="text" id="lat" placeholder="Широта" readonly>
        <input type="text" id="lon" placeholder="Долгота" readonly>
        <select id="snow-type">
            <option value="Снежная каша">Снежная каша</option>
            <option value="Гололед">Гололед</option>
            <option value="Сугробы">Сугробы</option>
            <option value="Не почищен тротуар">Не почищен тротуар</option>
        </select>
        <button class="btn btn-primary" style="width:100%; margin-top: 10px;" onclick="submitReport()">Отправить</button>
    </div>

    <div id="admin-panel" class="side-panel">
        <span class="close-btn" onclick="closePanels()">&times;</span>
        <h2>Список пользователей</h2>
        <div id="users-list"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([61.6688, 50.8365], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let tempMarker = null;

        function togglePanel(id) {
            const panel = document.getElementById(id);
            const isOpen = panel.classList.contains('open');
            closePanels();
            if (!isOpen) panel.classList.add('open');
        }

        function closePanels() {
            document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('open'));
        }

        // Клик по карте для получения координат
        map.on('click', (e) => {
            document.getElementById('lat').value = e.latlng.lat.toFixed(6);
            document.getElementById('lon').value = e.latlng.lng.toFixed(6);
            if (tempMarker) map.removeLayer(tempMarker);
            tempMarker = L.marker(e.latlng).addTo(map);
            if (!document.getElementById('report-panel').classList.contains('open')) {
                togglePanel('report-panel');
            }
        });

        // Функция обновления UI (вход/выход)
        function updateUI() {
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('role');
            const authBtn = document.getElementById('auth-main-btn');
            const adminBtn = document.getElementById('admin-btn');

            if (token && token !== "undefined") {
                authBtn.innerText = 'Выйти (' + role + ')';
                authBtn.onclick = () => { localStorage.clear(); location.reload(); };
                if (role === 'admin') adminBtn.style.display = 'block';
            } else {
                authBtn.innerText = 'Вход / Регистрация';
                authBtn.onclick = () => togglePanel('auth-panel');
                adminBtn.style.display = 'none';
            }
        }

        // Авторизация и Регистрация
        async function handleAuth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const statusDiv = document.getElementById('auth-status');
            
            if(!email || !password) return alert("Заполните поля!");

            let url = type === 'register' ? `/api/auth/register?email=${email}&password=${password}` : `/api/auth/login`;
            let formData = null;
            if (type === 'login') {
                formData = new FormData();
                formData.append('username', email);
                formData.append('password', password);
            }

            try {
                const res = await fetch(url, { method: 'POST', body: formData });
                const data = await res.json();
                
                if (res.ok) {
                    if (type === 'login') {
                        localStorage.setItem('token', data.access_token);
                        localStorage.setItem('role', data.role);
                        location.reload(); 
                    } else {
                        alert("Регистрация успешна! Теперь нажмите кнопку 'Войти'");
                        statusDiv.style.color = "green";
                        statusDiv.innerText = "Аккаунт создан. Введите пароль еще раз и войдите.";
                    }
                } else {
                    statusDiv.innerText = data.detail || "Ошибка операции";
                }
            } catch (e) {
                statusDiv.innerText = "Нет связи с сервером";
            }
        }

        // Отправка новой точки (доступно всем)
        async function submitReport() {
            const lat = document.getElementById('lat').value;
            const lon = document.getElementById('lon').value;
            if(!lat) return alert("Выберите место на карте!");

            try {
                const res = await fetch('/api/reports', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        lat: parseFloat(lat),
                        lon: parseFloat(lon),
                        snow_type: document.getElementById('snow-type').value
                    })
                });
                if (res.ok) {
                    alert("Заявка отправлена!");
                    location.reload();
                }
            } catch (e) { alert("Ошибка при отправке"); }
        }

        // Загрузка всех меток
        async function loadReports() {
            try {
                const res = await fetch('/api/reports');
                const data = await res.json();
                const role = localStorage.getItem('role');

                data.forEach(r => {
                    const isCleaned = r.status === 'cleaned';
                    const marker = L.marker([r.lat, r.lon]).addTo(map);
                    
                    let popupContent = `<div style="min-width:180px">
                        <b style="font-size:14px">${r.snow_type}</b><br>
                        <span style="color:${isCleaned ? '#28a745' : '#f39c12'}">
                            ${isCleaned ? '✅ Почищено' : '⏳ Ожидает уборки'}
                        </span><br>`;
                    
                    if (r.photo_url) {
                        const imgUrl = r.photo_url + '?t=' + new Date().getTime();
                        popupContent += `<img src="${imgUrl}" class="report-img" onclick="window.open('${r.photo_url}', '_blank')">`;
                    }

                    // Если пользователь уборщик или админ - показываем форму отчета
                    if (!isCleaned && (role === 'cleaner' || role === 'admin')) {
                        popupContent += `<hr><label style="font-size:12px">Загрузить фото:</label>
                                         <input type="file" id="file-${r.id}" style="font-size:11px">
                                         <button class="btn btn-primary" style="width:100%; padding:5px; margin-top:5px;" onclick="markDone(${r.id})">Отправить отчет</button>`;
                    }
                    
                    if (role === 'admin') {
                        popupContent += `<button class="btn btn-secondary" style="width:100%; padding:5px; margin-top:5px; background:#ff4d4d;" onclick="deleteReport(${r.id})">Удалить</button>`;
                    }

                    popupContent += `</div>`;
                    marker.bindPopup(popupContent);
                });
            } catch (e) { console.error("Ошибка загрузки меток"); }
        }

        async function markDone(id) {
            const fileInput = document.getElementById(`file-${id}`);
            if (!fileInput.files[0]) return alert("Выберите файл!");
            const fd = new FormData();
            fd.append('file', fileInput.files[0]);
            const res = await fetch(`/api/cleaner/reports/${id}/done`, { method: 'POST', body: fd });
            if (res.ok) location.reload();
        }

        async function deleteReport(id) {
            if (!confirm("Удалить метку?")) return;
            await fetch(`/api/admin/reports/${id}`, { method: 'DELETE' });
            location.reload();
        }

        async function openAdminPanel() {
            const token = localStorage.getItem('token');
            togglePanel('admin-panel');
            const list = document.getElementById('users-list');
            list.innerHTML = "Загрузка...";
            
            const res = await fetch('/api/admin/users', { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            
            if (res.ok) {
                list.innerHTML = data.map(u => `
                    <div class="user-item">
                        <span style="font-weight:bold">${u.email}</span>
                        <select onchange="changeRole(${u.id}, this.value)">
                            <option value="user" ${u.role === 'user' ? 'selected' : ''}>Житель</option>
                            <option value="cleaner" ${u.role === 'cleaner' ? 'selected' : ''}>Уборщик</option>
                            <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Админ</option>
                        </select>
                    </div>
                `).join('');
            }
        }

        async function changeRole(uid, role) {
            await fetch(`/api/admin/users/${uid}/role`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ role: role })
            });
            alert("Роль обновлена");
        }

        // Запуск при старте
        updateUI();
        loadReports();
    </script>
</body>
</html>
