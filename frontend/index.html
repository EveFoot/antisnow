<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AntiSnow</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #007bff; --danger: #dc3545; --success: #28a745; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        .top-nav { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; background: white; padding: 10px 25px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 15px; }
        .btn { padding: 8px 18px; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: var(--primary); color: white; }
        .side-panel { position: fixed; top: 0; right: -450px; width: 350px; height: 100vh; background: white; z-index: 2000; transition: 0.4s; padding: 25px; box-shadow: -5px 0 20px rgba(0,0,0,0.15); overflow-y: auto; }
        .side-panel.open { right: 0; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .photos-container { display: flex; gap: 8px; margin-top: 10px; }
        .photo-block { flex: 1; text-align: center; }
        .photo-block img { width: 100%; height: 90px; border-radius: 5px; object-fit: cover; border: 1px solid #eee; cursor: zoom-in; }
        .photo-block b { display: block; font-size: 10px; margin-bottom: 2px; }
        .time-info { font-size: 11px; color: #777; margin: 2px 0; }
    </style>
</head>
<body>

<div class="top-nav">
    <div id="user-info" style="font-size: 12px; color: #666;"></div>
    <button id="auth-btn" class="btn btn-primary" onclick="togglePanel('auth-panel')">Вход</button>
    <button id="add-btn" class="btn btn-primary" style="display:none">Поставить метку</button>
    <button id="admin-btn" class="btn" style="background:var(--danger); color:white; display:none" onclick="openAdmin()">Админка</button>
</div>

<div id="map"></div>

<div id="report-panel" class="side-panel">
    <h2>Новая метка</h2>
    <input type="hidden" id="lat"><input type="hidden" id="lon">
    <select id="snow-type"><option>Снежная каша</option><option>Гололед</option><option>Сугробы</option></select>
    <label>Фото (необязательно):</label>
    <input type="file" id="file-in" accept="image/*">
    <button class="btn btn-primary" style="width:100%; margin-top:10px" onclick="submitReport()">Отправить</button>
</div>

<div id="auth-panel" class="side-panel">
    <h2>Аккаунт</h2>
    <input type="email" id="email" placeholder="Email"><input type="password" id="password" placeholder="Пароль">
    <button class="btn btn-primary" style="width:100%" onclick="handleAuth('login')">Войти</button>
    <button class="btn" style="width:100%; margin-top:10px; background:var(--success); color:white" onclick="handleAuth('register')">Регистрация</button>
</div>

<div id="admin-panel" class="side-panel">
    <h2>Пользователи</h2>
    <div id="users-list"></div>
    <button class="btn" style="width:100%; margin-top:20px" onclick="closePanels()">Закрыть</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false }).setView([61.6688, 50.8365], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const icons = {
        pending: new L.Icon({iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png', iconSize: [25, 41], iconAnchor: [12, 41]}),
        cleaned: new L.Icon({iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png', iconSize: [25, 41], iconAnchor: [12, 41]}),
        verified: new L.Icon({iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png', iconSize: [25, 41], iconAnchor: [12, 41]})
    };

    function togglePanel(id) { closePanels(); document.getElementById(id).classList.add('open'); }
    function closePanels() { document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('open')); }
    function fmtDate(d) { return d ? new Date(d).toLocaleString('ru-RU', {hour:'2-digit', minute:'2-digit'}) : '--'; }

    map.on('click', e => {
        if(!localStorage.getItem('token')) return togglePanel('auth-panel');
        document.getElementById('lat').value = e.latlng.lat;
        document.getElementById('lon').value = e.latlng.lng;
        togglePanel('report-panel');
    });

    async function handleAuth(type) {
        const e = document.getElementById('email').value, p = document.getElementById('password').value;
        const fd = new FormData();
        if(type === 'login') { fd.append('username', e); fd.append('password', p); }
        const url = type === 'register' ? `/api/auth/register?email=${e}&password=${p}` : `/api/auth/login`;
        const res = await fetch(url, { method: 'POST', body: fd });
        const data = await res.json();
        if(res.ok && type === 'login') {
            localStorage.setItem('token', data.access_token);
            localStorage.setItem('role', data.role);
            localStorage.setItem('email', data.email);
            location.reload();
        } else if(res.ok) alert("Успешно!");
    }

    async function submitReport() {
        const fd = new FormData();
        fd.append('lat', document.getElementById('lat').value);
        fd.append('lon', document.getElementById('lon').value);
        fd.append('snow_type', document.getElementById('snow-type').value);
        const f = document.getElementById('file-in').files[0];
        if(f) fd.append('file', f);
        await fetch('/api/reports', { method: 'POST', headers: {'Authorization': 'Bearer ' + localStorage.getItem('token')}, body: fd });
        location.reload();
    }

    async function loadReports() {
        const res = await fetch('/api/reports');
        const reports = await res.json();
        const role = localStorage.getItem('role');
        reports.forEach(r => {
            const m = L.marker([r.lat, r.lon], {icon: icons[r.status] || icons.pending}).addTo(map);
            let h = `<div style="min-width:200px"><b>${r.snow_type}</b><br>`;
            h += `<div class="time-info">👤 Автор: ${r.author_email || 'системный'}</div>`;
            h += `<div class="time-info">🕒 ${fmtDate(r.created_at)}</div>`;
            
            h += `<div class="photos-container">`;
            h += `<div class="photo-block"><b>ДО</b>${r.photo_url ? `<img src="${r.photo_url}" onclick="window.open('${r.photo_url}')">` : '—'}</div>`;
            h += `<div class="photo-block"><b>ПОСЛЕ</b>${r.done_photo_url ? `<img src="${r.done_photo_url}" onclick="window.open('${r.done_photo_url}')">` : '—'}</div>`;
            h += `</div>`;

            if(r.status === 'pending' && (role === 'cleaner' || role === 'admin')) {
                h += `<hr><input type="file" id="f-${r.id}"><button class="btn btn-primary" style="width:100%;margin-top:5px" onclick="markDone(${r.id})">Убрано</button>`;
            }
            if(r.status === 'cleaned' && role === 'admin') {
                h += `<hr><button class="btn" style="background:var(--success);color:white;width:100%" onclick="verify(${r.id})">Подтвердить</button>`;
            }
            if(role === 'admin') h += `<button class="btn" style="background:var(--danger);color:white;width:100%;margin-top:5px" onclick="del(${r.id})">Удалить</button>`;
            h += `</div>`;
            m.bindPopup(h);
        });
    }

    async function markDone(id) {
        const fd = new FormData(); const f = document.getElementById(`f-${id}`).files[0];
        if(f) fd.append('file', f);
        await fetch(`/api/reports/${id}/done`, { method: 'POST', headers: {'Authorization': 'Bearer '+localStorage.getItem('token')}, body: fd });
        location.reload();
    }

    async function verify(id) {
        await fetch(`/api/reports/${id}/verify`, { method: 'POST', headers: {'Authorization': 'Bearer '+localStorage.getItem('token')} });
        location.reload();
    }

    async function del(id) {
        if(confirm("Удалить?")) {
            await fetch(`/api/reports/${id}`, { method: 'DELETE', headers: {'Authorization': 'Bearer '+localStorage.getItem('token')} });
            location.reload();
        }
    }

    async function openAdmin() {
        togglePanel('admin-panel');
        const res = await fetch('/api/admin/users', { headers: {'Authorization': 'Bearer '+localStorage.getItem('token')} });
        const users = await res.json();
        document.getElementById('users-list').innerHTML = users.map(u => `
            <div style="margin-bottom:10px">${u.email} <select onchange="upRole(${u.id}, this.value)">
                <option value="user" ${u.role==='user'?'selected':''}>User</option>
                <option value="cleaner" ${u.role==='cleaner'?'selected':''}>Cleaner</option>
                <option value="admin" ${u.role==='admin'?'selected':''}>Admin</option>
            </select></div>
        `).join('');
    }

    async function upRole(id, role) {
        await fetch(`/api/admin/users/${id}/role`, { method: 'PUT', headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer '+localStorage.getItem('token')}, body: JSON.stringify({role}) });
    }

    const email = localStorage.getItem('email');
    if(email) {
        document.getElementById('user-info').innerText = email;
        document.getElementById('add-btn').style.display = 'block';
        if(localStorage.getItem('role') === 'admin') document.getElementById('admin-btn').style.display = 'block';
    }
    loadReports();
</script>
</body>
</html>
