<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AntiSnow - Чистый город</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --dark: #343a40;
        }

        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }

        /* Красивая верхняя панель */
        .top-nav { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: white; padding: 10px 20px; border-radius: 50px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); display: flex; gap: 10px;
        }

        .btn { 
            padding: 10px 20px; border: none; border-radius: 25px; cursor: pointer; 
            font-weight: 600; font-size: 13px; transition: 0.3s; 
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #0056b3; }
        .btn-outline { background: #eee; color: var(--dark); }

        /* Боковые панели */
        .side-panel { 
            position: absolute; top: 0; right: -400px; width: 320px; height: 100vh; 
            background: white; z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            padding: 30px; box-shadow: -5px 0 20px rgba(0,0,0,0.1); overflow-y: auto;
        }
        .side-panel.open { right: 0; }
        
        .close-btn { float: right; cursor: pointer; font-size: 28px; color: #ccc; }
        
        h2 { margin-top: 0; font-size: 22px; color: var(--dark); }
        input, select { 
            width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; 
            border-radius: 10px; box-sizing: border-box; font-size: 14px;
        }

        .report-img { width: 100%; border-radius: 10px; margin: 10px 0; border: 1px solid #eee; }
        
        /* Кнопка навигатора в попапе */
        .route-btn { 
            background: var(--success); color: white; width: 100%; margin-top: 10px; 
            text-decoration: none; display: block; text-align: center; line-height: 45px; 
            border-radius: 10px; font-weight: bold; 
        }
        .route-btn:hover { background: #218838; }

        .time-info { font-size: 11px; color: #888; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="top-nav">
        <button id="auth-btn" class="btn btn-primary" onclick="togglePanel('auth-panel')">Вход</button>
        <button id="add-btn" class="btn btn-primary" style="display:none" onclick="togglePanel('report-panel')">Добавить метку</button>
    </div>

    <div id="map"></div>

    <div id="report-panel" class="side-panel">
        <span class="close-btn" onclick="closePanels()">×</span>
        <h2>Новая метка</h2>
        <input type="text" id="lat" placeholder="Широта" readonly>
        <input type="text" id="lon" placeholder="Долгота" readonly>
        <select id="snow-type">
            <option>Снежная каша</option>
            <option>Гололед</option>
            <option>Большие сугробы</option>
        </select>
        <label style="font-size: 12px; color: #666;">Фото проблемы:</label>
        <input type="file" id="file-in" accept="image/*">
        <button class="btn btn-primary" style="width:100%; margin-top: 15px;" onclick="submitReport()">Отправить отчет</button>
    </div>

    <div id="auth-panel" class="side-panel">
        <span class="close-btn" onclick="closePanels()">×</span>
        <h2>Авторизация</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Пароль">
        <button class="btn btn-primary" style="width:100%; margin-top: 10px;" onclick="handleAuth('login')">Войти</button>
        <button class="btn btn-outline" style="width:100%; margin-top: 10px;" onclick="handleAuth('register')">Создать аккаунт</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const API_URL = "http://localhost:8000"; 
        const map = L.map('map', { zoomControl: false }).setView([61.6688, 50.8365], 13);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        function openInGoogleMaps(lat, lon) {
            const url = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}&travelmode=driving`;
            window.open(url, '_blank');
        }

        function togglePanel(id) {
            const panel = document.getElementById(id);
            const isOpen = panel.classList.contains('open');
            closePanels();
            if (!isOpen) panel.classList.add('open');
        }

        function closePanels() {
            document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('open'));
        }

        function formatDate(d) { return d ? new Date(d).toLocaleString('ru-RU') : '--'; }

        map.on('click', e => {
            if(!localStorage.getItem('token')) return togglePanel('auth-panel');
            document.getElementById('lat').value = e.latlng.lat.toFixed(6);
            document.getElementById('lon').value = e.latlng.lng.toFixed(6);
            togglePanel('report-panel');
        });

        async function handleAuth(type) {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            if(!e || !p) return alert("Заполните поля!");

            let url = type === 'register' ? `${API_URL}/api/auth/register?email=${e}&password=${p}` : `${API_URL}/api/auth/login`;
            
            let body = null;
            if(type === 'login') {
                body = new FormData();
                body.append('username', e);
                body.append('password', p);
            }

            try {
                const res = await fetch(url, { method: 'POST', body: body });
                const data = await res.json();

                if(res.ok) {
                    if(type === 'login') {
                        localStorage.setItem('token', data.access_token);
                        location.reload();
                    } else {
                        alert("Регистрация успешна! Теперь войдите.");
                    }
                } else {
                    alert("Ошибка: " + (data.detail || "что-то пошло не так"));
                }
            } catch (err) {
                alert("Нет связи с сервером");
            }
        }

        async function loadReports() {
            const res = await fetch(`${API_URL}/api/reports`);
            const data = await res.json();
            data.forEach(r => {
                const m = L.marker([r.lat, r.lon]).addTo(map);
                let content = `<div style="min-width:200px;"><b>${r.snow_type}</b><br>`;
                content += `<div class="time-info">🕒 ${formatDate(r.created_at)}</div>`;
                if(r.photo_url) content += `<img src="${r.photo_url}" class="report-img">`;
                content += `<button class="route-btn" onclick="openInGoogleMaps(${r.lat}, ${r.lon})">🧭 Проложить маршрут</button></div>`;
                m.bindPopup(content);
            });
        }

        async function submitReport() {
            const token = localStorage.getItem('token');
            const fd = new FormData();
            fd.append('lat', document.getElementById('lat').value);
            fd.append('lon', document.getElementById('lon').value);
            fd.append('snow_type', document.getElementById('snow-type').value);
            const file = document.getElementById('file-in').files[0];
            if(file) fd.append('file', file);

            const res = await fetch(`${API_URL}/api/reports`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: fd
            });
            if(res.ok) location.reload();
        }

        if(localStorage.getItem('token')) {
            document.getElementById('auth-btn').innerText = "Выход";
            document.getElementById('auth-btn').onclick = () => { localStorage.clear(); location.reload(); };
            document.getElementById('add-btn').style.display = "block";
        }

        loadReports();
    </script>
</body>
</html>
