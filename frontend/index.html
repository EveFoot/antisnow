<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AntiSnow - 37.230.169.95</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #007bff; --danger: #dc3545; --success: #28a745; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }

        .top-nav { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: white; padding: 10px 20px; border-radius: 50px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: flex; gap: 10px;
        }
        .btn { padding: 10px 20px; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-admin { background: var(--danger); color: white; display: none; }

        .side-panel { 
            position: fixed; top: 0; right: -450px; width: 350px; height: 100vh; 
            background: white; z-index: 2000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            padding: 30px; box-shadow: -5px 0 20px rgba(0,0,0,0.15); box-sizing: border-box;
        }
        .side-panel.open { right: 0; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .user-card { border-bottom: 1px solid #eee; padding: 15px 0; }
    </style>
</head>
<body>

<div class="top-nav">
    <button id="auth-btn" class="btn btn-primary" onclick="togglePanel('auth-panel')">Вход</button>
    <button id="add-btn" class="btn btn-primary" style="display:none">Поставить метку (клик по карте)</button>
    <button id="admin-btn" class="btn btn-admin" onclick="togglePanel('admin-panel')">Упр. правами</button>
</div>

<div id="map"></div>

<div id="report-panel" class="side-panel">
    <h2>Новая метка</h2>
    <input type="text" id="lat" readonly>
    <input type="text" id="lon" readonly>
    <select id="snow-type">
        <option value="Снежная каша">Снежная каша</option>
        <option value="Гололед">Гололед</option>
        <option value="Сугробы">Сугробы</option>
    </select>
    <input type="file" id="file-in" accept="image/*">
    <button class="btn btn-primary" style="width:100%" onclick="submitReport()">Отправить</button>
    <button class="btn" style="width:100%; margin-top:10px;" onclick="closePanels()">Отмена</button>
</div>

<div id="auth-panel" class="side-panel">
    <h2>Аккаунт</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Пароль">
    <button class="btn btn-primary" style="width:100%" onclick="handleAuth('login')">Войти</button>
    <button class="btn" style="width:100%; margin-top:10px; background:var(--success); color:white" onclick="handleAuth('register')">Регистрация</button>
    <button class="btn" style="width:100%; margin-top:10px;" onclick="closePanels()">Закрыть</button>
</div>

<div id="admin-panel" class="side-panel">
    <h2>Права пользователей</h2>
    <div id="users-list" style="max-height: 80vh; overflow-y: auto;"></div>
    <button class="btn" style="width:100%; margin-top:10px;" onclick="closePanels()">Закрыть</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false }).setView([61.6688, 50.8365], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    function togglePanel(id) {
        const p = document.getElementById(id);
        const isOpened = p.classList.contains('open');
        closePanels();
        if(!isOpened) p.classList.add('open');
    }

    function closePanels() {
        document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('open'));
    }

    map.on('click', e => {
        if(!localStorage.getItem('token')) return togglePanel('auth-panel');
        document.getElementById('lat').value = e.latlng.lat.toFixed(6);
        document.getElementById('lon').value = e.latlng.lng.toFixed(6);
        togglePanel('report-panel');
    });

    async function handleAuth(type) {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        const url = type === 'register' ? `/api/auth/register?email=${e}&password=${p}` : `/api/auth/login`;
        let fd = null;
        if(type === 'login') { fd = new FormData(); fd.append('username', e); fd.append('password', p); }

        const res = await fetch(url, { method: 'POST', body: fd });
        if(res.ok) {
            if(type === 'login') {
                const data = await res.json();
                localStorage.setItem('token', data.access_token);
                location.reload();
            } else alert("Регистрация успешна!");
        } else alert("Ошибка!");
    }

    async function submitReport() {
        const fd = new FormData();
        fd.append('lat', document.getElementById('lat').value);
        fd.append('lon', document.getElementById('lon').value);
        fd.append('snow_type', document.getElementById('snow-type').value);
        const f = document.getElementById('file-in').files[0];
        if(f) fd.append('file', f);

        const res = await fetch('/api/reports', {
            method: 'POST',
            body: fd,
            headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
        });
        if(res.ok) { alert("Метка добавлена!"); location.reload(); }
        else { alert("Ошибка при сохранении метки"); }
    }

    async function loadUsers() {
        const res = await fetch('/api/admin/users', {
            headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
        });
        const users = await res.json();
        const container = document.getElementById('users-list');
        container.innerHTML = users.map(u => `
            <div class="user-card">
                <b>${u.email}</b>
                <select onchange="updateRole(${u.id}, this.value)">
                    <option value="user" ${u.role === 'user' ? 'selected' : ''}>User</option>
                    <option value="cleaner" ${u.role === 'cleaner' ? 'selected' : ''}>Cleaner</option>
                    <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Admin</option>
                </select>
            </div>
        `).join('');
    }

    async function updateRole(userId, newRole) {
        const res = await fetch(`/api/admin/users/${userId}/role`, {
            method: 'PUT',
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + localStorage.getItem('token')
            },
            body: JSON.stringify({ role: newRole })
        });
        if(res.ok) alert("Роль обновлена");
    }

    function parseJwt(t) { try { return JSON.parse(atob(t.split('.')[1])); } catch(e) { return null; } }

    const token = localStorage.getItem('token');
    if(token) {
        const u = parseJwt(token);
        document.getElementById('auth-btn').innerText = 'Выйти';
        document.getElementById('auth-btn').onclick = () => { localStorage.clear(); location.reload(); };
        document.getElementById('add-btn').style.display = 'block';
        if(u.role === 'admin') {
            document.getElementById('admin-btn').style.display = 'block';
            loadUsers();
        }
    }
</script>
</body>
</html>
