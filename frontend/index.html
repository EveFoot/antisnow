<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AntiSnow Clean & Verify</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --blue: #007AFF; --red: #FF3B30; --green: #34C759; --gray: #8E8E93; }
        body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background: #f8f9fa; color: #1c1c1e; }
        #map { height: 100vh; width: 100vw; }
        
        .floating-nav { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            padding: 8px 20px; border-radius: 40px; box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            display: flex; gap: 12px; align-items: center; border: 1px solid #fff;
        }

        .panel { 
            position: fixed; top: 0; right: -400px; width: 340px; height: 100vh; 
            background: white; z-index: 2000; transition: 0.4s cubic-bezier(0.4,0,0.2,1); 
            padding: 30px; box-shadow: -10px 0 30px rgba(0,0,0,0.05); overflow-y: auto;
        }
        .panel.open { right: 0; }

        .btn { border: none; padding: 12px 20px; border-radius: 14px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; text-align: center; }
        .btn-main { background: var(--blue); color: white; width: 100%; }
        .btn-verify { background: var(--green); color: white; width: 100%; margin-top: 5px; }
        .btn-outline { background: #f2f2f7; color: #000; }

        .report-card { width: 100%; border-radius: 12px; overflow: hidden; margin-top: 8px; border: 1px solid #eee; }
        .img-box { width: 100%; height: 130px; object-fit: cover; display: block; background: #f0f0f0; }
        .status-badge { font-size: 10px; padding: 3px 8px; border-radius: 10px; font-weight: bold; text-transform: uppercase; }
        
        input, select { width: 100%; padding: 14px; margin: 10px 0; border: none; background: #f2f2f7; border-radius: 12px; }
    </style>
</head>
<body>

<div class="floating-nav">
    <span id="user-info" style="font-size:12px; font-weight:700">AntiSnow</span>
    <button class="btn btn-outline" style="padding: 8px 16px" onclick="openP('auth-p')">Аккаунт</button>
    <button id="adm-btn" class="btn" style="display:none; background:#000; color:#fff; padding: 8px 16px" onclick="loadUsers()">Админка</button>
</div>

<div id="map"></div>

<div id="auth-p" class="panel">
    <h2 style="margin-top:0">Профиль</h2>
    <div id="auth-form">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Пароль">
        <button class="btn btn-main" onclick="auth('login')">Войти</button>
        <button class="btn" style="width:100%; margin-top:10px" onclick="auth('reg')">Создать аккаунт</button>
    </div>
    <button id="out-btn" class="btn" style="width:100%; margin-top:30px; color:var(--red); display:none" onclick="localStorage.clear();location.reload()">Выйти из профиля</button>
</div>

<div id="add-p" class="panel">
    <h2>Новая точка</h2>
    <input type="hidden" id="lat"><input type="hidden" id="lon">
    <select id="stype">
        <option>Снежные завалы</option>
        <option>Сильный гололед</option>
        <option>Слякоть и грязь</option>
    </select>
    <input type="file" id="file-in" accept="image/*">
    <button class="btn btn-main" style="margin-top:20px" onclick="save()">Опубликовать</button>
</div>

<div id="adm-p" class="panel">
    <h2>Пользователи</h2>
    <div id="u-list"></div>
    <button class="btn btn-outline" style="width:100%; margin-top:20px" onclick="openP()">Закрыть</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', {zoomControl: false}).setView([61.6688, 50.8365], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    function openP(id) { 
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('open'));
        if(id) document.getElementById(id).classList.add('open');
    }

    map.on('click', e => {
        if(!localStorage.getItem('token')) return openP('auth-p');
        document.getElementById('lat').value = e.latlng.lat;
        document.getElementById('lon').value = e.latlng.lng;
        openP('add-p');
    });

    const fmt = (d) => d ? new Date(d).toLocaleString('ru-RU', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}) : '—';

    async function auth(t) {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        const fd = new FormData(); if(t==='login'){ fd.append('username', e); fd.append('password', p); }
        const res = await fetch(t==='reg'?`/api/auth/register?email=${e}&password=${p}`:'/api/auth/login', {method:'POST', body:fd});
        if(res.ok) {
            const d = await res.json();
            if(t==='login'){
                localStorage.setItem('token', d.access_token);
                localStorage.setItem('role', d.role);
                localStorage.setItem('email', d.email);
                location.reload();
            } else alert("Успех!");
        }
    }

    async function save() {
        const fd = new FormData();
        fd.append('lat', document.getElementById('lat').value); fd.append('lon', document.getElementById('lon').value);
        fd.append('snow_type', document.getElementById('stype').value);
        const f = document.getElementById('file-in').files[0]; if(f) fd.append('file', f);
        await fetch('/api/reports', {method:'POST', headers:{'Authorization': `Bearer ${localStorage.getItem('token')}`}, body:fd});
        location.reload();
    }

    async function load() {
        const res = await fetch('/api/reports');
        const data = await res.json();
        const role = localStorage.getItem('role');

        data.forEach(r => {
            // Определение цвета точки
            let color = 'red';
            let statusText = 'Ожидает';
            if(r.status === 'cleaned') { color = 'blue'; statusText = 'Убрано'; }
            if(r.status === 'verified') { color = 'green'; statusText = 'Проверено'; }

            const icon = L.icon({
                iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${color}.png`,
                iconSize: [25, 41], iconAnchor: [12, 41]
            });
            
            const m = L.marker([r.lat, r.lon], {icon}).addTo(map);
            
            let h = `<div style="width:220px; font-family: sans-serif;">
                <div style="display:flex; justify-content:space-between; align-items:center">
                    <b style="font-size:14px">${r.snow_type}</b>
                    <span class="status-badge" style="background:${r.status==='pending'?'#ffe5e5':r.status==='cleaned'?'#e5f1ff':'#e5f9e0'}; color:var(--${color})">${statusText}</span>
                </div>
                <div style="display:flex; gap:8px; margin-top:10px">
                    <div style="flex:1">
                        <small style="color:#888">До:</small>
                        ${r.photo_url ? `<img src="${r.photo_url}" class="img-box">` : '<div class="img-box"></div>'}
                        <div style="font-size:9px; margin-top:2px">${fmt(r.created_at)}</div>
                    </div>
                    <div style="flex:1">
                        <small style="color:#888">После:</small>
                        ${r.done_photo_url ? `<img src="${r.done_photo_url}" class="img-box">` : '<div class="img-box"></div>'}
                        <div style="font-size:9px; margin-top:2px">${r.status!=='pending' ? fmt(r.updated_at) : ''}</div>
                    </div>
                </div>`;
            
            if(r.status === 'pending' && (role === 'cleaner' || role === 'admin')) {
                h += `<input type="file" id="f-${r.id}" style="font-size:10px; margin-top:10px">
                      <button class="btn btn-main" style="padding:6px; margin-top:5px; font-size:12px" onclick="setDone(${r.id})">Завершить уборку</button>`;
            }
            
            if(r.status === 'cleaned' && role === 'admin') {
                h += `<button class="btn btn-verify" style="padding:6px; font-size:12px" onclick="verify(${r.id})">Подтвердить проверку</button>`;
            }

            if(role === 'admin') {
                h += `<button onclick="del(${r.id})" style="width:100%; background:none; border:none; color:red; font-size:11px; margin-top:10px; cursor:pointer">Удалить метку</button>`;
            }

            m.bindPopup(h + `</div>`);
        });
    }

    async function setDone(id) {
        const fd = new FormData(); const f = document.getElementById(`f-${id}`).files[0];
        if(f) fd.append('file', f);
        await fetch(`/api/reports/${id}/done`, {method:'POST', body:fd});
        location.reload();
    }

    async function verify(id) {
        await fetch(`/api/reports/${id}/verify`, {
            method:'POST',
            headers:{'Authorization': `Bearer ${localStorage.getItem('token')}`}
        });
        location.reload();
    }

    async function del(id) {
        if(confirm('Удалить?')) {
            await fetch(`/api/reports/${id}`, {
                method:'DELETE',
                headers:{'Authorization': `Bearer ${localStorage.getItem('token')}`}
            });
            location.reload();
        }
    }

    async function loadUsers() {
        openP('adm-p');
        const res = await fetch('/api/admin/users', {headers:{'Authorization': `Bearer ${localStorage.getItem('token')}`}});
        const users = await res.json();
        document.getElementById('u-list').innerHTML = users.map(u => `
            <div style="padding:15px 0; border-bottom:1px solid #eee">
                <div style="font-weight:600; font-size:13px">${u.email}</div>
                <select onchange="updateRole(${u.id}, this.value)" style="margin-top:5px; font-size:12px; padding:5px">
                    <option value="user" ${u.role==='user'?'selected':''}>User</option>
                    <option value="cleaner" ${u.role==='cleaner'?'selected':''}>Cleaner</option>
                    <option value="admin" ${u.role==='admin'?'selected':''}>Admin</option>
                </select>
            </div>
        `).join('');
    }

    async function updateRole(uid, role) {
        await fetch(`/api/admin/users/${uid}/role?new_role=${role}`, {
            method:'PATCH',
            headers:{'Authorization': `Bearer ${localStorage.getItem('token')}`}
        });
    }

    // Init
    if(localStorage.getItem('token')) {
        document.getElementById('user-info').innerText = localStorage.getItem('email');
        document.getElementById('auth-form').style.display = 'none';
        document.getElementById('out-btn').style.display = 'block';
        if(localStorage.getItem('role') === 'admin') document.getElementById('adm-btn').style.display = 'block';
    }
    load();
</script>
</body>
</html>
