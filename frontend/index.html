<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Антиснег — Карта</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 90vh; width: 100%; border-radius: 10px; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 10px; background: #f0f2f5; }
        h2 { text-align: center; color: #1a365d; }
    </style>
</head>
<body>
    <h2>📍 Оперативная карта сугробов — Сыктывкар</h2>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([61.6688, 50.8212], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        async function loadMarkers() {
            try {
                const res = await fetch('/api/reports');
                const data = await res.json();
                data.forEach(p => {
                    L.marker([p.lat, p.lon]).addTo(map)
                     .bindPopup(`<b>${p.address}</b><br>Статус: ${p.status}`);
                });
            } catch (e) { console.error("Ошибка загрузки:", e); }
        }

        map.on('click', async (e) => {
            const desc = prompt("Что здесь случилось? (например: Обледенение)");
            if (desc) {
                const url = `/api/report?address=${encodeURIComponent(desc)}&lat=${e.latlng.lat}&lon=${e.latlng.lng}`;
                const res = await fetch(url, { method: 'POST' });
                if (res.ok) {
                    alert("Отправлено!");
                    location.reload();
                }
            }
        });

        loadMarkers();
    </script>
</body>
</html>
