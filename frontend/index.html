<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AntiSnow - Сыктывкар</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; background: #f0f2f5; }
        #map { height: 100vh; width: 100vw; }
        
        .top-nav {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: white; padding: 10px 20px;
            border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex; gap: 10px;
        }

        .btn { padding: 8px 20px; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 14px; }
        .btn-primary { background: #007bff; color: white; }
        .btn-primary:hover { background: #0056b3; }
        .btn-admin { background: #dc3545; color: white; display: none; }
        
        .side-panel {
            position: absolute; top: 0; right: -400px; width: 350px; height: 100vh;
            background: white; z-index: 1001; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            padding: 25px; box-shadow: -5px 0 15px rgba(0,0,0,0.1); overflow-y: auto;
        }
        .side-panel.open { right: 0; }
        .close-btn { float: right; cursor: pointer; font-size: 28px; color: #666; line-height: 20px; }

        h2 { margin-top: 0; color: #333; }
        label { display: block; margin-top: 15px; font-size: 13px; color: #666; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        input[readonly] { background: #f9f9f9; cursor: not-allowed; }

        .btn-clean { background: #28a745; color: white; margin-top: 10px; width: 100%; }
        .btn-delete { background: #ff4d4d; color: white; margin-top: 5px; width: 100%; }
        .report-img { width: 100%; border-radius: 8px; margin-top: 10px; cursor: pointer; border: 1px solid #eee; }
        
        .user-item { padding: 15px; border-bottom: 1px solid #eee; display: flex; flex-direction: column; gap: 5px; }
        .user-email { font-weight: bold; color: #333; word-break: break-all; }
    </style>
</head>
<body>

    <div class="top-nav">
        <button id="auth-main-btn" class="btn btn-primary" onclick="togglePanel('auth-panel')">Вход / Регистрация</button>
        <button class="btn btn-primary" onclick="togglePanel('report-panel')">Сообщить о снеге</button>
        <button id="admin-btn" class="btn btn-admin" onclick="openAdminPanel()">Права</button>
    </div>

    <div id="map"></div>

    <div id="auth-panel" class="side-panel">
        <span class="close-btn" onclick="closePanels()">&times;</span>
        <h2>Аккаунт</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Пароль">
        <button class="btn btn-primary" style="width:100%" onclick="handleAuth('login')">Войти</button>
        <button class="btn" style="width:100%; margin-top:10px; background: #eee;" onclick="handleAuth('register')">Регистрация</button>
        <p id="auth-status" style="color: red; font-size: 14px; text-align: center;"></p>
    </div>

    <div id="report-panel" class="side-panel">
        <span class="close-btn" onclick="closePanels()">&times;</span>
        <h2>Новая метка</h2>
        <p style="font-size: 13px; color: #666; background: #e7f3ff; padding: 10px; border-radius: 8px;">
            Нажмите на любое место на карте, чтобы указать координаты.
        </p>
        <label>Координаты</label>
        <input type="text" id="lat" placeholder="Широта" readonly>
        <input type="text" id="lon" placeholder="Долгота" readonly>
        
        <label>Что случилось?</label>
        <select id="snow-type">
            <option value="Снежная каша">Снежная каша</option>
            <option value="Гололед">Гололед</option>
            <option value="Сугробы">Сугробы</option>
            <option value="Не почищено">Не почищено</option>
        </select>
        <button class="btn btn-primary" style="width:100%; margin-top: 10px;" onclick="submitReport()">Отправить заявку</button>
    </div>

    <div id="admin-panel" class="side-panel">
        <span class="close-btn" onclick="closePanels()">&times;</span>
        <h2>Управление правами</h2>
        <div id="users-list"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Карта Сыктывкара
        const map = L.map('map').setView([61.6688, 50.8365], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let tempMarker = null; // Временный маркер для новой точки

        function togglePanel(id) {
            const panel = document.getElementById(id);
            const isOpen = panel.classList.contains('open');
            closePanels();
            if (!isOpen) panel.classList.add('open');
        }

        function closePanels() {
            document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('open'));
        }

        // Клик по карте
        map.on('click', (e) => {
            document.getElementById('lat').value = e.latlng.lat.toFixed(6);
            document.getElementById('lon').value = e.latlng.lng.toFixed(6);
            
            // Ставим временный маркер, чтобы пользователь видел, куда нажал
            if (tempMarker) map.removeLayer(tempMarker);
            tempMarker = L.marker(e.latlng).addTo(map);
            
            if (!document.getElementById('report-panel').classList.contains('open')) {
                togglePanel('report-panel');
            }
        });

        function updateUI() {
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('role');
            if (token) {
                const btn = document.getElementById('auth-main-btn');
                btn.innerText = 'Выйти';
                btn.onclick = () => { localStorage.clear(); location.reload(); };
                if (role === 'admin') document.getElementById('admin-btn').style.display = 'block';
            }
        }

        async function handleAuth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            let url = type === 'register' ? `/api/auth/register?email=${email}&password=${password}` : `/api/auth/login`;
            let body = null;
            
            if (type === 'login') {
                body = new FormData();
                body.append('username', email);
                body.append('password', password);
            }

            try {
                const res = await fetch(url, { method: 'POST', body: body });
                const data = await res.json();
                if (res.ok) {
                    if (type === 'login') {
                        localStorage.setItem('token', data.access_token);
                        localStorage.setItem('role', data.role);
                        location.reload();
                    } else alert("Регистрация успешна!");
                } else document.getElementById('auth-status').innerText = data.detail || "Ошибка";
            } catch (e) { alert("Сервер недоступен"); }
        }

        // ОТПРАВКА МЕТКИ
        async function submitReport() {
            const lat = document.getElementById('lat').value;
            const lon = document.getElementById('lon').value;
            const snowType = document.getElementById('snow-type').value;

            if (!lat || !lon) {
                alert("Сначала выберите точку на карте!");
                return;
            }

            const payload = {
                lat: parseFloat(lat),
                lon: parseFloat(lon),
                snow_type: String(snowType)
            };

            try {
                const res = await fetch('/api/reports', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    alert("Готово! Ваша заявка принята.");
                    location.reload();
                } else {
                    const error = await res.json();
                    console.error("Ошибка API:", error);
                    alert("Не удалось сохранить: " + (error.detail || "неизвестная ошибка"));
                }
            } catch (e) {
                console.error("Сетевая ошибка:", e);
                alert("Ошибка сети. Проверьте соединение с сервером.");
            }
        }

        async function loadReports() {
            const res = await fetch('/api/reports');
            const data = await res.json();
            const role = localStorage.getItem('role');
            if (Array.isArray(data)) {
                data.forEach(r => {
                    const isCleaned = r.status === 'cleaned';
                    const marker = L.marker([r.lat, r.lon]).addTo(map);
                    
                    let html = `<div style="min-width: 150px;">
                        <b>${r.snow_type}</b><br>
                        <span style="color: ${isCleaned ? 'green' : 'orange'}">
                            ${isCleaned ? '✅ Почищено' : '⏳ Ожидает уборки'}
                        </span>`;
                    
                    if (r.photo_url) {
                        html += `<br><img src="${r.photo_url}" class="report-img" onclick="window.open(this.src)">`;
                    }

                    if (!isCleaned && (role === 'cleaner' || role === 'admin')) {
                        html += `<hr><label style="font-size:11px">Доказать уборку (фото):</label>
                                 <input type="file" id="file-${r.id}" style="font-size:11px">
                                 <button class="btn btn-clean" onclick="markDone(${r.id})">Отметить как убрано</button>`;
                    }

                    if (role === 'admin') {
                        html += `<button class="btn btn-delete" onclick="deleteReport(${r.id})">Удалить точку</button>`;
                    }
                    
                    html += `</div>`;
                    marker.bindPopup(html);
                });
            }
        }

        async function markDone(id) {
            const fileInput = document.getElementById(`file-${id}`);
            if (!fileInput.files[0]) return alert("Загрузите фото результата!");
            
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            const res = await fetch(`/api/cleaner/reports/${id}/done`, {
                method: 'POST',
                body: formData
            });
            if (res.ok) location.reload();
            else alert("Ошибка при сохранении фото");
        }

        async function deleteReport(id) {
            if (!confirm("Вы уверены, что хотите удалить эту заявку?")) return;
            const res = await fetch(`/api/admin/reports/${id}`, { method: 'DELETE' });
            if (res.ok) location.reload();
        }

        async function openAdminPanel() {
            const token = localStorage.getItem('token');
            togglePanel('admin-panel');
            const list = document.getElementById('users-list');
            list.innerHTML = "Загрузка...";
            
            try {
                const res = await fetch('/api/admin/users', { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                if (res.ok) {
                    list.innerHTML = data.map(u => `
                        <div class="user-item">
                            <span class="user-email">${u.email}</span>
                            <select onchange="changeUserRole(${u.id}, this.value)">
                                <option value="user" ${u.role === 'user' ? 'selected' : ''}>Житель</option>
                                <option value="cleaner" ${u.role === 'cleaner' ? 'selected' : ''}>Уборщик</option>
                                <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Админ</option>
                            </select>
                        </div>
                    `).join('');
                }
            } catch(e) { list.innerHTML = "Ошибка доступа к списку."; }
        }

        async function changeUserRole(userId, newRole) {
            const res = await fetch(`/api/admin/users/${userId}/role`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ role: newRole })
            });
            if (res.ok) alert("Роль изменена!");
        }

        updateUI();
        loadReports();
    </script>
</body>
</html>
