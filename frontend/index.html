<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AntiSnow City Control</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --blue: #007AFF; --red: #FF3B30; --green: #34C759; --bg: #F2F2F7; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: #1c1c1e; }
        #map { height: 100vh; width: 100vw; z-index: 1; }
        
        .nav-bar { 
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: white; padding: 10px 25px; border-radius: 30px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: flex; gap: 15px; align-items: center;
        }

        .side-panel { 
            position: fixed; top: 0; right: -400px; width: 340px; height: 100vh; 
            background: white; z-index: 2000; transition: 0.3s ease; padding: 25px; 
            box-shadow: -5px 0 25px rgba(0,0,0,0.1); overflow-y: auto;
        }
        .side-panel.open { right: 0; }

        .btn { border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-blue { background: var(--blue); color: white; width: 100%; }
        .btn-green { background: var(--green); color: white; width: 100%; margin-top: 8px; }

        .photo-container { width: 100%; border-radius: 10px; margin-top: 5px; background: #eee; overflow: hidden; min-height: 80px; border: 1px solid #ddd; }
        .photo-img { width: 100%; display: block; height: auto; object-fit: cover; }
        
        .coord-badge { font-family: monospace; font-size: 10px; color: #666; background: #f0f0f0; padding: 3px 6px; border-radius: 5px; display: inline-block; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .status-tag { padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; float: right; color: white; }
    </style>
</head>
<body>

<div class="nav-bar">
    <b id="user-display">AntiSnow</b>
    <button class="btn" style="background:#f0f0f0; padding: 8px 15px" onclick="toggle('auth-p')">Профиль</button>
    <button id="adm-btn" class="btn" style="display:none; background:#333; color:white; padding: 8px 15px" onclick="openAdmin()">Админ</button>
</div>

<div id="map"></div>

<div id="auth-p" class="side-panel">
    <h2>Аккаунт</h2>
    <div id="auth-form">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Пароль">
        <button class="btn btn-blue" onclick="auth('login')">Войти</button>
        <button class="btn" style="width:100%; margin-top:10px" onclick="auth('reg')">Регистрация</button>
    </div>
    <button id="out-btn" class="btn" style="width:100%; margin-top:40px; color:red; display:none" onclick="localStorage.clear();location.reload()">Выйти</button>
</div>

<div id="add-p" class="side-panel">
    <h2>Новая метка</h2>
    <div style="margin-bottom:10px">
        <small>Координаты:</small> <span id="cur-coords" class="coord-badge">...</span>
    </div>
    <input type="hidden" id="lat"><input type="hidden" id="lon">
    <select id="stype">
        <option>Снежный завал</option>
        <option>Гололед</option>
        <option>Слякоть</option>
    </select>
    <textarea id="desc" placeholder="Описание (необязательно)" rows="3"></textarea>
    <input type="file" id="file-in" accept="image/*">
    <button class="btn btn-blue" onclick="save()">Отправить</button>
</div>

<div id="adm-p" class="side-panel">
    <h2>Пользователи</h2>
    <div id="u-list"></div>
    <button class="btn" style="width:100%; margin-top:20px; background:#f0f0f0" onclick="toggle()">Закрыть</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', {zoomControl: false}).setView([61.6688, 50.8365], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    function toggle(id) {
        document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('open'));
        if(id) document.getElementById(id).classList.add('open');
    }

    map.on('click', e => {
        if(!localStorage.getItem('token')) return toggle('auth-p');
        document.getElementById('lat').value = e.latlng.lat;
        document.getElementById('lon').value = e.latlng.lng;
        document.getElementById('cur-coords').innerText = `${e.latlng.lat.toFixed(5)}, ${e.latlng.lng.toFixed(5)}`;
        toggle('add-p');
    });

    async function auth(t) {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        const fd = new FormData(); if(t==='login'){ fd.append('username', e); fd.append('password', p); }
        const res = await fetch(t==='reg'?`/api/auth/register?email=${e}&password=${p}`:'/api/auth/login', {method:'POST', body:fd});
        if(res.ok) {
            const d = await res.json();
            if(t==='login'){
                localStorage.setItem('token', d.access_token);
                localStorage.setItem('role', d.role);
                localStorage.setItem('email', d.email);
                location.reload();
            } else alert("Регистрация успешна!");
        }
    }

    async function save() {
        const fd = new FormData();
        fd.append('lat', document.getElementById('lat').value);
        fd.append('lon', document.getElementById('lon').value);
        fd.append('snow_type', document.getElementById('stype').value);
        fd.append('description', document.getElementById('desc').value);
        const f = document.getElementById('file-in').files[0];
        if(f) fd.append('file', f);
        await fetch('/api/reports', {method:'POST', headers:{'Authorization': `Bearer ${localStorage.getItem('token')}`}, body:fd});
        location.reload();
    }

    async function load() {
        const res = await fetch('/api/reports');
        const data = await res.json();
        const myRole = localStorage.getItem('role');

        data.forEach(r => {
            let color = 'red'; let sTxt = 'Новая';
            if(r.status === 'cleaned') { color = 'blue'; sTxt = 'Убрано'; }
            if(r.status === 'verified') { color = 'green'; sTxt = 'Проверено'; }

            const icon = L.icon({
                iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${color}.png`,
                iconSize: [25, 41], iconAnchor: [12, 41]
            });
            const m = L.marker([r.lat, r.lon], {icon}).addTo(map);

            const pBtn = (url) => {
                if(!url) return `<div class="photo-container"></div>`;
                const full = url.startsWith('http') ? url : window.location.origin + url;
                return `<div class="photo-container"><img src="${full}" class="photo-img"></div>`;
            };

            let h = `<div style="width:240px">
                <span class="status-tag" style="background:${color}">${sTxt}</span>
                <b style="font-size:16px">${r.snow_type}</b><br>
                <div style="font-size:12px; color:#444; margin:5px 0">${r.description || ''}</div>
                <div class="coord-badge">${r.lat.toFixed(5)}, ${r.lon.toFixed(5)}</div>
                <div style="display:flex; gap:8px; margin-top:10px">
                    <div style="flex:1"><small>До:</small>${pBtn(r.photo_url)}</div>
                    <div style="flex:1"><small>После:</small>${pBtn(r.done_photo_url)}</div>
                </div>`;

            if(r.status === 'pending' && (myRole === 'cleaner' || myRole === 'admin')) {
                h += `<input type="file" id="f-${r.id}" style="font-size:10px; margin-top:10px">
                      <button class="btn btn-blue" style="padding:6px; font-size:12px; margin-top:5px" onclick="setDone(${r.id})">Сдать отчет</button>`;
            }
            if(r.status === 'cleaned' && myRole === 'admin') {
                h += `<button class="btn btn-green" style="padding:6px; font-size:12px" onclick="verify(${r.id})">Подтвердить</button>`;
            }
            if(myRole === 'admin') {
                h += `<button onclick="del(${r.id})" style="width:100%; background:none; border:none; color:red; font-size:11px; margin-top:12px; cursor:pointer">Удалить</button>`;
            }
            m.bindPopup(h + `</div>`);
        });
    }

    async function setDone(id) {
        const fd = new FormData(); const f = document.getElementById(`f-${id}`).files[0];
        if(f) fd.append('file', f);
        await fetch(`/api/reports/${id}/done`, {method:'POST', body:fd});
        location.reload();
    }

    async function verify(id) {
        await fetch(`/api/reports/${id}/verify`, {method:'POST', headers:{'Authorization': `Bearer ${localStorage.getItem('token')}`}});
        location.reload();
    }

    async function del(id) {
        if(confirm('Удалить?')) {
            await fetch(`/api/reports/${id}`, {method:'DELETE', headers:{'Authorization': `Bearer ${localStorage.getItem('token')}`}});
            location.reload();
        }
    }

    async function openAdmin() {
        toggle('adm-p');
        const res = await fetch('/api/admin/users', {headers:{'Authorization': `Bearer ${localStorage.getItem('token')}`}});
        const users = await res.json();
        document.getElementById('u-list').innerHTML = users.map(u => `
            <div style="padding:10px 0; border-bottom:1px solid #eee">
                <div style="font-weight:600">${u.email}</div>
                <select onchange="updateRole(${u.id}, this.value)" style="margin-top:5px">
                    <option value="user" ${u.role==='user'?'selected':''}>User</option>
                    <option value="cleaner" ${u.role==='cleaner'?'selected':''}>Cleaner</option>
                    <option value="admin" ${u.role==='admin'?'selected':''}>Admin</option>
                </select>
            </div>
        `).join('');
    }

    async function updateRole(uid, role) {
        await fetch(`/api/admin/users/${uid}/role?new_role=${role}`, {method:'PATCH', headers:{'Authorization': `Bearer ${localStorage.getItem('token')}`}});
    }

    if(localStorage.getItem('token')) {
        document.getElementById('user-display').innerText = localStorage.getItem('email');
        document.getElementById('auth-form').style.display = 'none';
        document.getElementById('out-btn').style.display = 'block';
        if(localStorage.getItem('role') === 'admin') document.getElementById('adm-btn').style.display = 'block';
    }
    load();
</script>
</body>
</html>
