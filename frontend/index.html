<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AntiSnow — Чистый город</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #3498db; --danger: #e74c3c; --success: #2ecc71; --dark: #2c3e50; }
        body { margin: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }

        /* Навигация */
        .top-nav { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 1000; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            padding: 8px 20px; border-radius: 30px; border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 15px; 
        }
        .user-tag { font-size: 13px; font-weight: 600; color: var(--dark); border-right: 1px solid #eee; padding-right: 15px; }

        /* Кнопки */
        .btn { padding: 10px 20px; border: none; border-radius: 20px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3); }
        .btn-outline { background: #f8f9fa; color: var(--dark); border: 1px solid #ddd; }

        /* Боковые панели */
        .side-panel { 
            position: fixed; top: 15px; right: -420px; width: 340px; height: calc(100vh - 30px); 
            background: white; z-index: 2000; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            padding: 25px; border-radius: 20px; box-shadow: -10px 0 30px rgba(0,0,0,0.05); overflow-y: auto; 
        }
        .side-panel.open { right: 15px; }

        /* Стилизация попапа карты */
        .leaflet-popup-content-wrapper { border-radius: 15px; padding: 5px; }
        .report-card { min-width: 240px; }
        .status-pill { 
            display: inline-block; padding: 3px 10px; border-radius: 12px; 
            font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px;
        }
        
        .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 12px 0; }
        .photo-item { text-align: center; }
        .photo-item img { 
            width: 100%; height: 100px; object-fit: cover; border-radius: 10px; 
            background: #f0f2f5; border: 1px solid #eee; cursor: pointer;
        }
        .photo-item b { display: block; font-size: 10px; color: #95a5a6; margin-bottom: 4px; }
        .photo-item span { font-size: 9px; color: #bdc3c7; display: block; margin-top: 4px; }

        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #eee; border-radius: 12px; background: #fbfbfb; }
        .admin-user { padding: 10px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="top-nav">
    <div id="user-info" class="user-tag" style="display:none"></div>
    <button id="auth-btn" class="btn btn-outline" onclick="togglePanel('auth-panel')">Войти</button>
    <button id="add-btn" class="btn btn-primary" style="display:none">Поставить метку</button>
    <button id="admin-btn" class="btn" style="background:var(--dark); color:white; display:none" onclick="openAdmin()">Админ</button>
</div>

<div id="map"></div>

<div id="report-panel" class="side-panel">
    <h2 style="margin-top:0">Новая метка</h2>
    <input type="hidden" id="lat"><input type="hidden" id="lon">
    <label style="font-size:12px; color:#7f8c8d">Тип проблемы</label>
    <select id="snow-type">
        <option>Снежная каша</option>
        <option>Гололед</option>
        <option>Сугробы</option>
    </select>
    <label style="font-size:12px; color:#7f8c8d">Фото (ДО)</label>
    <input type="file" id="file-in" accept="image/*">
    <button class="btn btn-primary" style="width:100%; margin-top:15px" onclick="submitReport()">Отправить</button>
    <button class="btn btn-outline" style="width:100%; margin-top:10px" onclick="closePanels()">Отмена</button>
</div>

<div id="auth-panel" class="side-panel">
    <h2>Авторизация</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Пароль">
    <button class="btn btn-primary" style="width:100%" onclick="handleAuth('login')">Войти</button>
    <button class="btn btn-outline" style="width:100%; margin-top:10px" onclick="handleAuth('register')">Регистрация</button>
</div>

<div id="admin-panel" class="side-panel">
    <h2>Пользователи</h2>
    <div id="users-list"></div>
    <button class="btn btn-outline" style="width:100%; margin-top:20px" onclick="closePanels()">Закрыть</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false }).setView([61.6688, 50.8365], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const icons = {
        pending: new L.Icon({iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png', iconSize: [25, 41], iconAnchor: [12, 41]}),
        cleaned: new L.Icon({iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png', iconSize: [25, 41], iconAnchor: [12, 41]}),
        verified: new L.Icon({iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png', iconSize: [25, 41], iconAnchor: [12, 41]})
    };

    function togglePanel(id) { closePanels(); document.getElementById(id).classList.add('open'); }
    function closePanels() { document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('open')); }
    function fmtDate(d) { return d ? new Date(d).toLocaleString('ru-RU', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}) : '--:--'; }

    map.on('click', e => {
        if(!localStorage.getItem('token')) return togglePanel('auth-panel');
        document.getElementById('lat').value = e.latlng.lat;
        document.getElementById('lon').value = e.latlng.lng;
        togglePanel('report-panel');
    });

    async function handleAuth(type) {
        const e = document.getElementById('email').value, p = document.getElementById('password').value;
        const fd = new FormData();
        if(type === 'login') { fd.append('username', e); fd.append('password', p); }
        const url = type === 'register' ? `/api/auth/register?email=${e}&password=${p}` : `/api/auth/login`;
        const res = await fetch(url, { method: 'POST', body: fd });
        const data = await res.json();
        if(res.ok && type === 'login') {
            localStorage.setItem('token', data.access_token);
            localStorage.setItem('role', data.role);
            localStorage.setItem('user_email', data.email);
            location.reload();
        } else if(res.ok) alert("Успешно! Войдите.");
    }

    async function submitReport() {
        const fd = new FormData();
        fd.append('lat', document.getElementById('lat').value);
        fd.append('lon', document.getElementById('lon').value);
        fd.append('snow_type', document.getElementById('snow-type').value);
        const f = document.getElementById('file-in').files[0];
        if(f) fd.append('file', f);
        await fetch('/api/reports', { method: 'POST', headers: {'Authorization': 'Bearer ' + localStorage.getItem('token')}, body: fd });
        location.reload();
    }

    async function loadReports() {
        const res = await fetch('/api/reports');
        const reports = await res.json();
        const role = localStorage.getItem('role');
        
        reports.forEach(r => {
            const m = L.marker([r.lat, r.lon], {icon: icons[r.status] || icons.pending}).addTo(map);
            const color = r.status === 'pending' ? 'var(--danger)' : (r.status === 'cleaned' ? 'var(--primary)' : 'var(--success)');
            
            let h = `<div class="report-card">
                <span class="status-pill" style="background:${color}; color:white">${r.status}</span>
                <div style="font-weight:bold; font-size:15px">${r.snow_type}</div>
                <div style="font-size:11px; color:#7f8c8d; margin-bottom:10px">👤 ${r.author_email || 'anonymous'}</div>
                
                <div class="photo-grid">
                    <div class="photo-item">
                        <b>ДО</b>
                        ${r.photo_url ? `<img src="${r.photo_url}" onclick="window.open('${r.photo_url}')">` : '<div style="height:100px; background:#f0f0f0; border-radius:10px"></div>'}
                        <span>${fmtDate(r.created_at)}</span>
                    </div>
                    <div class="photo-item">
                        <b>ПОСЛЕ</b>
                        ${r.done_photo_url ? `<img src="${r.done_photo_url}" onclick="window.open('${r.done_photo_url}')">` : '<div style="height:100px; background:#f0f0f0; border-radius:10px"></div>'}
                        <span>${r.status !== 'pending' ? fmtDate(r.updated_at) : '--:--'}</span>
                    </div>
                </div>`;

            if(r.status === 'pending' && (role === 'cleaner' || role === 'admin')) {
                h += `<hr><input type="file" id="f-${r.id}" style="font-size:10px"><button class="btn btn-primary" style="width:100%; padding:5px; margin-top:5px" onclick="markDone(${r.id})">Готово</button>`;
            }
            if(role === 'admin') h += `<button class="btn" style="background:#eee; width:100%; margin-top:5px; font-size:10px" onclick="del(${r.id})">Удалить</button>`;
            
            h += `</div>`;
            m.bindPopup(h);
        });
    }

    async function markDone(id) {
        const fd = new FormData(); const f = document.getElementById(`f-${id}`).files[0];
        if(!f) return alert("Нужно фото после уборки!");
        fd.append('file', f);
        await fetch(`/api/reports/${id}/done`, { method: 'POST', headers: {'Authorization': 'Bearer '+localStorage.getItem('token')}, body: fd });
        location.reload();
    }

    async function del(id) {
        if(confirm("Удалить?")) {
            await fetch(`/api/reports/${id}`, { method: 'DELETE', headers: {'Authorization': 'Bearer '+localStorage.getItem('token')} });
            location.reload();
        }
    }

    // Инициализация
    const email = localStorage.getItem('user_email');
    if(email) {
        document.getElementById('user-info').innerText = email;
        document.getElementById('user-info').style.display = 'block';
        document.getElementById('auth-btn').innerText = 'Выйти';
        document.getElementById('auth-btn').onclick = () => { localStorage.clear(); location.reload(); };
        document.getElementById('add-btn').style.display = 'block';
        if(localStorage.getItem('role') === 'admin') document.getElementById('admin-btn').style.display = 'block';
    }
    loadReports();
</script>
</body>
</html>
