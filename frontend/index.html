<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AntiSnow — Чистый Город</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --blue: #007bff; --red: #dc3545; --green: #28a745; --dark: #343a40; }
        body { margin: 0; font-family: sans-serif; background: #eee; }
        #map { height: 100vh; width: 100vw; }

        .nav { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000; background: white; padding: 10px 20px; border-radius: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); display: flex; gap: 10px; align-items: center; }
        .btn { border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .btn-main { background: var(--blue); color: white; }
        
        .panel { position: fixed; top: 0; right: -350px; width: 300px; height: 100vh; background: white; z-index: 2000; transition: 0.3s; padding: 20px; box-shadow: -5px 0 15px rgba(0,0,0,0.1); }
        .panel.open { right: 0; }

        /* Попап */
        .photo-wrap { display: flex; gap: 5px; margin-top: 10px; }
        .photo-box { flex: 1; text-align: center; }
        .photo-box a { display: block; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; height: 80px; }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; }
        .photo-box b { font-size: 10px; display: block; margin-bottom: 3px; color: #666; }
        .photo-box i { font-size: 9px; color: #999; font-style: normal; }
        
        .admin-user { padding: 10px; border-bottom: 1px solid #eee; font-size: 12px; }
    </style>
</head>
<body>

<div class="nav">
    <div id="u-info" style="font-size:12px; font-weight:bold"></div>
    <button id="auth-btn" class="btn" onclick="togglePanel('auth-p')">Войти</button>
    <button id="add-btn" class="btn btn-main" style="display:none">Ткните в карту</button>
    <button id="adm-btn" class="btn" style="background:var(--dark); color:white; display:none" onclick="loadUsers()">Админ</button>
</div>

<div id="map"></div>

<div id="report-p" class="panel">
    <h3>Новая метка</h3>
    <input type="hidden" id="lat"><input type="hidden" id="lon">
    <select id="stype" style="width:100%; padding:10px; margin-bottom:10px">
        <option>Каша/Грязь</option>
        <option>Гололед</option>
        <option>Сугробы</option>
    </select>
    <input type="file" id="file" style="margin-bottom:10px">
    <button class="btn btn-main" style="width:100%" onclick="sendReport()">Отправить</button>
    <button class="btn" style="width:100%; margin-top:5px" onclick="closePanels()">Отмена</button>
</div>

<div id="auth-p" class="panel">
    <h3>Вход</h3>
    <input type="email" id="email" placeholder="Email" style="width:100%; padding:10px; margin-bottom:10px">
    <input type="password" id="pass" placeholder="Пароль" style="width:100%; padding:10px; margin-bottom:10px">
    <button class="btn btn-main" style="width:100%" onclick="auth('login')">Войти</button>
    <button class="btn" style="width:100%; margin-top:5px" onclick="auth('reg')">Регистрация</button>
</div>

<div id="adm-p" class="panel">
    <h3>Пользователи</h3>
    <div id="u-list"></div>
    <button class="btn" style="width:100%; margin-top:10px" onclick="closePanels()">Закрыть</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { zoomControl: false }).setView([61.6688, 50.8365], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    function togglePanel(id) { closePanels(); document.getElementById(id).classList.add('open'); }
    function closePanels() { document.querySelectorAll('.panel').forEach(p => p.classList.remove('open')); }
    const fmt = (d) => d ? new Date(d).toLocaleString('ru-RU', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}) : '--:--';

    map.on('click', e => {
        if(!localStorage.getItem('token')) return togglePanel('auth-p');
        document.getElementById('lat').value = e.latlng.lat;
        document.getElementById('lon').value = e.latlng.lng;
        togglePanel('report-p');
    });

    async function auth(t) {
        const e = document.getElementById('email').value, p = document.getElementById('pass').value;
        const fd = new FormData();
        if(t === 'login') { fd.append('username', e); fd.append('password', p); }
        const res = await fetch(t === 'reg' ? `/api/auth/register?email=${e}&password=${p}` : '/api/auth/login', { method: 'POST', body: fd });
        if(res.ok) {
            const d = await res.json();
            if(t === 'login') {
                localStorage.setItem('token', d.access_token);
                localStorage.setItem('role', d.role);
                localStorage.setItem('email', d.email);
                location.reload();
            } else alert("Готово, теперь войдите");
        }
    }

    async function sendReport() {
        const fd = new FormData();
        fd.append('lat', document.getElementById('lat').value);
        fd.append('lon', document.getElementById('lon').value);
        fd.append('snow_type', document.getElementById('stype').value);
        const f = document.getElementById('file').files[0];
        if(f) fd.append('file', f);
        await fetch('/api/reports', { method: 'POST', body: fd });
        location.reload();
    }

    async function loadReports() {
        const res = await fetch('/api/reports');
        const data = await res.json();
        const role = localStorage.getItem('role');

        data.forEach(r => {
            const color = r.status === 'pending' ? 'red' : 'blue';
            const icon = new L.Icon({iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${color}.png`, iconSize: [25, 41], iconAnchor: [12, 41]});
            
            const m = L.marker([r.lat, r.lon], {icon}).addTo(map);
            
            let h = `<div style="width:200px">
                <b>${r.snow_type}</b><br>
                <div class="photo-wrap">
                    <div class="photo-box">
                        <b>ДО</b>
                        ${r.photo_url ? `<a href="${r.photo_url}" target="_blank"><img src="${r.photo_url}"></a>` : '<div style="height:80px;background:#eee"></div>'}
                        <i>${fmt(r.created_at)}</i>
                    </div>
                    <div class="photo-box">
                        <b>ПОСЛЕ</b>
                        ${r.done_photo_url ? `<a href="${r.done_photo_url}" target="_blank"><img src="${r.done_photo_url}"></a>` : '<div style="height:80px;background:#eee"></div>'}
                        <i>${r.status === 'cleaned' ? fmt(r.updated_at) : '--:--'}</i>
                    </div>
                </div>`;

            if(r.status === 'pending' && (role === 'cleaner' || role === 'admin')) {
                h += `<input type="file" id="f-${r.id}" style="font-size:10px; margin-top:10px">
                      <button class="btn btn-main" style="width:100%; margin-top:5px" onclick="setDone(${r.id})">Готово</button>`;
            }
            h += `</div>`;
            m.bindPopup(h);
        });
    }

    async function setDone(id) {
        const fd = new FormData();
        const f = document.getElementById(`f-${id}`).files[0];
        if(f) fd.append('file', f);
        await fetch(`/api/reports/${id}/done`, { method: 'POST', body: fd });
        location.reload();
    }

    async function loadUsers() {
        togglePanel('adm-p');
        const res = await fetch('/api/admin/users');
        const users = await res.json();
        document.getElementById('u-list').innerHTML = users.map(u => `<div class="admin-user">${u.email} [${u.role}]</div>`).join('');
    }

    // Init
    if(localStorage.getItem('token')) {
        document.getElementById('u-info').innerText = localStorage.getItem('email');
        document.getElementById('auth-btn').innerText = 'Выйти';
        document.getElementById('auth-btn').onclick = () => { localStorage.clear(); location.reload(); };
        document.getElementById('add-btn').style.display = 'block';
        if(localStorage.getItem('role') === 'admin') document.getElementById('adm-btn').style.display = 'block';
    }
    loadReports();
</script>
</body>
</html>
