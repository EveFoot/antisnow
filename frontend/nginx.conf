server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Проксирование запросов к бэкенду, чтобы не было проблем с портами
    location /api/ {
        proxy_pass http://backend:8000/;
    }
}