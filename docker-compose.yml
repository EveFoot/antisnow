services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user_admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: antisnow_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    volumes:
      - ./backend/static:/app/static
    environment:
      DATABASE_URL: postgresql://user_admin:password@db:5432/antisnow_db
    depends_on:
      - db

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./backend/static:/app/static
    depends_on:
      - backend

volumes:
  postgres_data: